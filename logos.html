<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Galeria de Logos</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    img {
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .filename {
      font-size: 12px;
      color: #666;
      word-break: break-all;
      margin-bottom: 8px;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #007bff;
      color: white;
      font-size: 12px;
    }

    button:hover {
      background: #0056b3;
    }

    .copied {
      background: #28a745 !important;
    }
  </style>
</head>
<body>

<h1>Galeria de Logos</h1>

<div class="grid" id="gallery"></div>

<script>
  const OWNER = "SEU_USUARIO";
  const REPO = "SEU_REPOSITORIO";
  const FOLDER = "logo";

  async function loadImages() {
    const apiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FOLDER}`;

    try {
      const response = await fetch(apiUrl);
      const data = await response.json();

      const gallery = document.getElementById("gallery");

      data
        .filter(file => file.type === "file")
        .forEach(file => {
          const url = file.download_url;

          const card = document.createElement("div");
          card.className = "card";

          card.innerHTML = `
            <img src="${url}" alt="${file.name}">
            <div class="filename">${file.name}</div>
            <button onclick="copyUrl(this, '${url}')">Copiar URL</button>
          `;

          gallery.appendChild(card);
        });

    } catch (error) {
      console.error(error);
      document.body.innerHTML += "<p style='color:red;text-align:center;'>Erro ao carregar imagens do repositório</p>";
    }
  }

  function copyUrl(button, url) {
    navigator.clipboard.writeText(url).then(() => {
      button.textContent = "Copiado!";
      button.classList.add("copied");

      setTimeout(() => {
        button.textContent = "Copiar URL";
        button.classList.remove("copied");
      }, 1500);
    });
  }

  loadImages();
</script>

</body>
</html>
