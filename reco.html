<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Recomposição - CMS Montes Claros</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ── TOKENS DA MARCA ── */
        :root {
            --cms-navy:   #0D2E5A;
            --cms-blue:   #1B6CB5;
            --cms-green:  #1E8A4A;
            --cms-yellow: #F5C400;
            --cms-white:  #FFFFFF;
            --cms-off:    #F7F8FA;
            --cms-ink:    #111827;
            --cms-muted:  #6B7280;
            --cms-border: #E5E7EB;
            --cms-danger: #E02020; /* Baseado no red-dot do mockup do guia */
            
            --font-display: 'Montserrat', sans-serif;
            --font-body:    'Open Sans', sans-serif;
        }

        /* ── RESET MÍNIMO E BASE ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-body);
            background: var(--cms-off);
            color: var(--cms-ink);
            line-height: 1.65;
            font-size: 15px;
        }

        /* ── NAVBAR PRINCIPAL ── */
        .topbar {
            background: var(--cms-navy);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            position: sticky; top: 0; z-index: 200;
        }
        .topbar-brand {
            font-family: var(--font-display);
            font-weight: 900;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--cms-white);
        }
        .topbar-brand span { color: var(--cms-yellow); }
        
        .nav-links { display: flex; gap: 24px; }
        .nav-btn {
            font-family: var(--font-display);
            font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
            text-transform: uppercase; color: rgba(255,255,255,0.65);
            background: transparent; border: none;
            cursor: pointer; transition: color .2s;
            padding: 10px 0; border-bottom: 2px solid transparent;
        }
        .nav-btn:hover { color: var(--cms-white); }
        .nav-btn.active { color: var(--cms-yellow); border-bottom-color: var(--cms-yellow); }

        /* Faixa decorativa Swiss Design */
        .cms-stripe {
            height: 4px;
            background: linear-gradient(to right, #F5C400 33.3%, #1E8A4A 33.3% 66.6%, #1B6CB5 66.6%);
        }

        /* ── CONTAINER E TIPOGRAFIA MESTRE ── */
        .container { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
        
        .section-eyebrow {
            font-family: var(--font-display); font-size: 11px; font-weight: 700;
            letter-spacing: 3px; text-transform: uppercase; color: var(--cms-blue);
            margin-bottom: 12px;
        }
        .section-title {
            font-family: var(--font-display); font-size: clamp(28px, 4vw, 44px);
            font-weight: 900; letter-spacing: -1px; line-height: 1.05;
            color: var(--cms-navy); margin-bottom: 40px;
        }

        /* ── MÓDULOS E TABS ── */
        .modulo { display: none; }
        .modulo.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tabs { display: flex; gap: 16px; margin-bottom: 32px; border-bottom: 2px solid var(--cms-border); }
        .tab-btn {
            background: none; border: none; padding: 12px 24px;
            font-family: var(--font-display); font-size: 13px; font-weight: 700;
            color: var(--cms-muted); cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: -2px; border-bottom: 3px solid transparent; transition: 0.2s;
        }
        .tab-btn:hover { color: var(--cms-navy); }
        .tab-btn.active { color: var(--cms-blue); border-bottom-color: var(--cms-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .loader { text-align: center; font-size: 14px; font-weight: 600; color: var(--cms-muted); margin-top: 50px; }

        /* ── GRIDS E CARDS SWISS ── */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        
        .cms-card {
            background: var(--cms-white);
            border-radius: 10px;
            padding: 28px;
            border: 1px solid var(--cms-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; gap: 12px;
            position: relative; overflow: hidden;
        }
        
        .cms-card.enviado { border-left: 4px solid var(--cms-green); }
        .cms-card.incompleto { border-left: 4px solid var(--cms-yellow); }
        .cms-card.pendente { border-left: 4px solid var(--cms-danger); }
        .cms-card.pleiteante { border-left: 4px solid var(--cms-blue); }

        .card-header { font-family: var(--font-display); font-size: 18px; font-weight: 800; color: var(--cms-navy); line-height: 1.2; letter-spacing: -0.5px; }
        
        /* ── BADGES INSTITUCIONAIS ── */
        .cms-badge {
            display: inline-block; padding: 4px 10px; border-radius: 4px;
            font-family: var(--font-display); font-size: 10px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase; width: max-content;
        }
        .bg-green { background: var(--cms-green); color: var(--cms-white); }
        .bg-yellow { background: var(--cms-yellow); color: var(--cms-navy); }
        .bg-danger { background: rgba(224, 32, 32, 0.1); color: var(--cms-danger); border: 1px solid rgba(224, 32, 32, 0.2); }
        .text-danger { color: var(--cms-danger); font-size: 13px; font-weight: 600; }

        /* ── TABELAS OFICIAIS ── */
        .cms-table { width: 100%; border-collapse: collapse; background: var(--cms-white); border-radius: 10px; overflow: hidden; border: 1px solid var(--cms-border); box-shadow: 0 4px 20px rgba(0,0,0,.04); }
        .cms-table thead tr { background: var(--cms-navy); color: var(--cms-white); }
        .cms-table th { padding: 16px 20px; text-align: left; font-family: var(--font-display); font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
        .cms-table td { padding: 16px 20px; border-bottom: 1px solid var(--cms-border); font-size: 14px; }
        .cms-table tbody tr:nth-child(even) td { background: var(--cms-off); }
        .cms-table tbody tr:hover td { background: #f0f4f8; }

        .status-ok { color: var(--cms-green); font-weight: 700; }
        .status-pendente { color: var(--cms-danger); font-weight: 600; }
        .status-alerta { color: #d39e00; font-weight: 700; }
        
        a { color: var(--cms-blue); text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <nav class="topbar">
        <div class="topbar-brand">CMS <span>Montes Claros</span></div>
        <div class="nav-links">
            <button class="nav-btn active" onclick="mudarModulo('modulo-recomposicao', this)">Recomposição Atual</button>
            <button class="nav-btn" onclick="mudarModulo('modulo-pleiteantes', this)">Novas Inscrições</button>
        </div>
    </nav>
    <div class="cms-stripe"></div>

    <div class="container">
        <div id="loader" class="loader">Sincronizando dados com a base oficial...</div>

        <div id="modulo-recomposicao" class="modulo active">
            <p class="section-eyebrow">Gestão de Vagas Atuais</p>
            <h2 class="section-title">Painel de <span>Recomposição</span></h2>

            <div class="tabs">
                <button class="tab-btn active" onclick="mudarAba('resumo', this)">Resumo em Cards</button>
                <button class="tab-btn" onclick="mudarAba('entidades', this)">Lista de Entidades</button>
                <button class="tab-btn" onclick="mudarAba('conselheiros', this)">Gabarito de Conselheiros</button>
            </div>
            
            <div id="resumo" class="tab-content active">
                <div class="grid-container" id="cards-container"></div>
            </div>
            
            <div id="entidades" class="tab-content">
                <table class="cms-table">
                    <thead><tr><th>Entidade</th><th>Status do Envio</th><th>Documentação (Ofício)</th></tr></thead>
                    <tbody id="tabela-entidades"></tbody>
                </table>
            </div>
            
            <div id="conselheiros" class="tab-content">
                <table class="cms-table">
                    <thead><tr><th>Entidade</th><th>Cadeira</th><th>Conselheiro Esperado</th><th>Validação do Formulário</th></tr></thead>
                    <tbody id="tabela-conselheiros"></tbody>
                </table>
            </div>
        </div>

        <div id="modulo-pleiteantes" class="modulo">
            <p class="section-eyebrow">Processo Seletivo</p>
            <h2 class="section-title">Entidades <span>Pleiteantes</span></h2>
            
            <div class="grid-container" id="cards-pleiteantes">
                </div>
        </div>

    </div>

    <script>
        // === COLOQUE A URL DO SEU GOOGLE APPS SCRIPT AQUI ===
        const urlAPI = 'https://script.google.com/macros/s/AKfycbzZTjXBcSn7flByQayOGtIaeCzlqmXaU5rQXL6WeNPqV7Z6vTaxiwbpfzMlU5E2rbEdHA/exec';

        const normalizar = (str) => {
            if (!str) return "";
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        };

        function mudarModulo(idModulo, elemento) {
            document.querySelectorAll('.modulo').forEach(mod => mod.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(idModulo).classList.add('active');
            elemento.classList.add('active');
        }

        function mudarAba(idAba, elemento) {
            document.querySelectorAll('.tab-content').forEach(aba => aba.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(idAba).classList.add('active');
            elemento.classList.add('active');
        }

        async function carregarDados() {
            try {
                const response = await fetch(urlAPI);
                const dados = await response.json();
                document.getElementById('loader').style.display = 'none';
                
                processarRecomposicao(dados.respostas, dados.conselheiros);
                processarPleiteantes(dados.pleiteantes);
            } catch (error) {
                document.getElementById('loader').innerText = 'Erro de sincronização. Verifique a URL do Web App.';
                console.error(error);
            }
        }

        // ==========================================
        // LÓGICA DO MÓDULO 1 (Recomposição)
        // ==========================================
        function processarRecomposicao(respostas, conselheirosEsperados) {
            const entidadesOficiais = [...new Set(conselheirosEsperados.map(c => c['ENTIDADE']).filter(e => e))];
            const containerCards = document.getElementById('cards-container');
            const tbodyEntidades = document.getElementById('tabela-entidades');
            const tbodyConselheiros = document.getElementById('tabela-conselheiros');

            entidadesOficiais.forEach(nomeOficial => {
                let submissao = respostas.find(resp => normalizar(resp['Nome completo da entidade']) === normalizar(nomeOficial));
                let status = "pendente"; let pendencias = "";

                if (submissao) {
                    const temOficio = submissao['Ofício'] && submissao['Ofício'].includes('http');
                    const temTitular = submissao['Conselheiro  Titular: Nome completo'] && submissao['Conselheiro  Titular: Nome completo'] !== 'N/A';
                    if (temOficio && temTitular) { status = "enviado"; } else { status = "incompleto"; }
                    if (!temOficio) pendencias += "Ofício ausente. ";
                    if (!temTitular) pendencias += "Titular não indicado.";
                }

                // Gerador de Classes para as Cores Oficiais
                let bgClass = status === 'enviado' ? 'bg-green' : (status === 'incompleto' ? 'bg-yellow' : 'bg-danger');
                let textoStatus = status === 'enviado' ? 'Documentação Completa' : (status === 'incompleto' ? 'Dados Incompletos' : 'Aguardando Envio');

                containerCards.innerHTML += `
                    <div class="cms-card ${status}">
                        <div class="card-header">${nomeOficial}</div>
                        <div>
                            <span class="cms-badge ${bgClass}">${textoStatus}</span>
                        </div>
                        ${pendencias ? `<div class="text-danger" style="margin-top:8px;">⚠️ ${pendencias}</div>` : ''}
                    </div>
                `;

                tbodyEntidades.innerHTML += `
                    <tr>
                        <td><strong>${nomeOficial}</strong></td>
                        <td class="${status==='enviado'?'status-ok':'status-pendente'}">${textoStatus.toUpperCase()}</td>
                        <td>${(submissao && submissao['Ofício']) ? `<a href="${submissao['Ofício']}" target="_blank">Visualizar Documento ↗</a>` : '-'}</td>
                    </tr>`;
            });

            conselheirosEsperados.forEach(esperado => {
                if(!esperado['NOME']) return;
                let submissao = respostas.find(resp => normalizar(resp['Nome completo da entidade']) === normalizar(esperado['ENTIDADE']));
                let status = "<span class='status-pendente'>Aguardando submissão</span>";
                
                if(submissao) {
                    let nomeDigitado = esperado['CADEIRA (TITULAR/SUPLENTE)'].toUpperCase() === "TITULAR" ? submissao['Conselheiro  Titular: Nome completo'] : submissao['Conselheiro Suplente: Nome completo'];
                    if(normalizar(nomeDigitado) === normalizar(esperado['NOME'])) status = `<span class='status-ok'>✅ Confirmado</span>`;
                    else if (nomeDigitado && nomeDigitado !== 'N/A') status = `<span class='status-alerta'>⚠️ Divergente (${nomeDigitado})</span>`;
                    else status = "<span class='status-pendente'>Não preenchido no formulário</span>";
                }
                
                tbodyConselheiros.innerHTML += `
                    <tr>
                        <td style="font-size: 12px; color: var(--cms-muted);">${esperado['ENTIDADE']}</td>
                        <td><strong>${esperado['CADEIRA (TITULAR/SUPLENTE)']}</strong></td>
                        <td>${esperado['NOME']}</td>
                        <td>${status}</td>
                    </tr>`;
            });
        }

        // ==========================================
        // LÓGICA DO MÓDULO 2 (Pleiteantes)
        // ==========================================
        function processarPleiteantes(pleiteantes) {
            const container = document.getElementById('cards-pleiteantes');
            
            if (!pleiteantes || pleiteantes.length === 0) {
                container.innerHTML = "<p style='color: var(--cms-muted);'>Nenhuma inscrição de pleiteante recebida até o momento.</p>";
                return;
            }

            pleiteantes.forEach(pleito => {
                // Adapte estas chaves conforme o cabeçalho exato da sua Aba 3
                const nomeEntidade = pleito['Nome da Entidade'] || 'Entidade Indefinida';
                const segmento = pleito['Segmento Pleiteado'] || 'Segmento não informado';
                const dataEnvio = pleito['Carimbo de data/hora'] || '';

                container.innerHTML += `
                    <div class="cms-card pleiteante">
                        <div class="section-eyebrow" style="margin-bottom:4px;">${segmento}</div>
                        <div class="card-header">${nomeEntidade}</div>
                        <div style="font-size: 12px; color: var(--cms-muted); border-bottom: 1px solid var(--cms-border); padding-bottom: 12px; margin-bottom: 12px;">
                            Inscrição recebida em: ${dataEnvio}
                        </div>
                        <div>
                            <a href="#">Visualizar Processo Completo ↗</a>
                        </div>
                    </div>
                `;
            });
        }

        // Start
        carregarDados();
    </script>
</body>
</html>
