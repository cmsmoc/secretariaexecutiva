<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS Montes Claros - Instagram Post</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
    /* RESET BÁSICO E DEFINIÇÕES DO CONTAINER (1080x1080px) */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        /* Fundo: Navy (#0D2E5A) - Diretriz de Identidade Visual */
        background-color: #0D2E5A;
        /* Fonte principal: Open Sans 400 - Diretriz de Identidade Visual */
        font-family: 'Open Sans', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    .instagram-post {
        width: 1080px;
        height: 1080px;
        position: relative;
        /* Espaço em branco generoso (margens mínimas: 8% da largura = ~86px) */
        padding: 86px; 
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Alinha topo e rodapé */
        color: #FFFFFF; /* Texto padrão Branco */
    }

    /* CABEÇALHO (Logo e Label de Tipo de Post) */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
    }

    /* Logo CMS (Canto superior esquerdo: círculo amarelo + texto branco) */
    .logo-container {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .logo-circle {
        width: 50px;
        height: 50px;
        /* Amarelo (#F5C400) - Cor de Acento */
        background-color: #F5C400;
        border-radius: 50%;
    }

    .logo-text {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        color: #FFFFFF;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* Label do Tipo de Post (Canto superior direito: caps, borda amarela) */
    .post-label {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        /* Amarelo (#F5C400) - Cor de Acento */
        color: #F5C400;
        font-size: 16px;
        text-transform: uppercase;
        /* Letter-spacing 2-3px - Diretriz Labels */
        letter-spacing: 2px;
        border: 2px solid #F5C400;
        padding: 8px 20px;
    }

    /* CORPO PRINCIPAL (Título e Data) */
    .main-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start; /* Alinhamento à esquerda - Swiss Design */
    }

    /* Título Display (Montserrat Black 900, oversize, branco/amarelo) */
    .title-display {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 110px; /* Oversize */
        line-height: 1;
        /* ALL CAPS e Tracking -2px - Diretriz Display/Títulos */
        text-transform: uppercase;
        letter-spacing: -2px;
        color: #FFFFFF;
        margin-bottom: 20px;
    }

    /* Dado em Destaque (Data) - Estilo Display/Títulos Amarelo */
    .highlight-data {
        font-family: 'Montserrat', sans-serif;
        font-weight: 900;
        font-size: 110px;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: -2px;
        /* Amarelo (#F5C400) - Cor de Acento */
        color: #F5C400;
        margin-bottom: 30px;
    }

    /* Informação Complementar (Local/Hora) - Estilo Open Sans 300, cinza claro */
    .complementary-info {
        font-family: 'Open Sans', sans-serif;
        font-weight: 300;
        /* Usando uma opacidade do branco para 'cinza claro' */
        color: rgba(255, 255, 255, 0.7);
        font-size: 40px;
        line-height: 1.2;
        margin-bottom: 50px;
    }

    /* Elemento Gráfico (Linha amarela de 3px) */
    .graphic-line {
        width: 300px;
        height: 3px;
        background-color: #F5C400;
    }

    /* RODAPÉ INSTITUCIONAL (Rodapé, Redes Sociais e Hashtags) */
    .footer {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding-top: 30px;
    }

    /* Rodapé institucional: Nome completo/sigla/site */
    .institutional-text {
        font-family: 'Open Sans', sans-serif;
        font-weight: 300;
        font-size: 16px; /* Caption: 12px mínima, 16px para rodapé de post */
        color: rgba(255, 255, 255, 0.8);
        max-width: 60%;
        line-height: 1.5;
    }

    .institutional-text strong {
        font-weight: 400;
    }

    .institutional-text a {
        color: inherit;
        text-decoration: none;
    }

    /* Redes Sociais e Hashtags */
    .social-hashes {
        text-align: right;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    /* Instagram - Estilo Caption: 12px */
    .instagram-handle {
        font-family: 'Open Sans', sans-serif;
        font-weight: 300;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.8);
    }

    /* Hashtags - Estilo Caption: 12px, Amarelo para destaque */
    .hashtags {
        font-family: 'Open Sans', sans-serif;
        font-weight: 300;
        font-size: 16px;
        color: #F5C400;
    }

</style>
</head>
<body>

    <div class="instagram-post">

        <div class="header">
            <div class="logo-container">
                <div class="logo-circle"></div>
                <div class="logo-text">CMS<br>Montes Claros</div>
            </div>
            <div class="post-label">CONVITE</div>
        </div>

        <div class="main-content">
            <h1 class="title-display">463ª REUNIÃO<br>ORDINÁRIA</h1>
            <p class="highlight-data">04/03/2026</p>
            <p class="complementary-info">13h30 · Câmara Municipal</p>
            <div class="graphic-line"></div>
        </div>

        <div class="footer">
            <div class="institutional-text">
                <p>Conselho Municipal de Saúde de Montes Claros – MG</p>
                <p><strong>Site:</strong> <a href="http://cms.montesclaros.mg.gov.br" target="_blank">cms.montesclaros.mg.gov.br</a></p>
            </div>
            <div class="social-hashes">
                <p class="instagram-handle">@conselhomunicipaldesaudemoc</p>
                <p class="hashtags">#SaúdeMC #ConselhoMunicipal</p>
            </div>
        </div>

    </div>

</body>
</html>
