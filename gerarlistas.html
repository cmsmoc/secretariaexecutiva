        function formatarNomeProprio(nome) {
            const excessoes = ['de', 'da', 'do', 'dos', 'das', 'e'];
            return nome.toLowerCase().split(' ').map((palavra, index) => {
                if (excessoes.includes(palavra) && index !== 0) return palavra;
                return palavra.charAt(0).toUpperCase() + palavra.slice(1);
            }).join(' ');
        }

        function normalizarParaBusca(txt) {
            return txt.normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim().toUpperCase();
        }

        function processarDados() {
            const input = document.getElementById('csvInput').value.trim();
            if (!input) return;

            const linhas = input.split('\n');
            const presentesT = [];
            const presentesS = [];
            const ausentes = [];

            linhas.forEach((linha, index) => {
                if (index === 0 && linha.includes("VOCÊ É CONSELHEIRO")) return;
                const colunas = linha.split('\t');
                if (colunas.length < 2) return;

                const nomeInput = colunas[0].trim();
                const status = colunas[1].toLowerCase();
                const justificativa = colunas[2] ? colunas[2].trim() : "Não informada";

                const conselheiro = baseConselheiros.find(c => normalizarParaBusca(c.nome) === normalizarParaBusca(nomeInput));

                if (conselheiro) {
                    const dadosFormatados = {
                        ...conselheiro,
                        nomeExibicao: formatarNomeProprio(conselheiro.nome),
                        motivo: justificativa
                    };

                    if (status.includes("presença") || status.includes("confirmo")) {
                        if (conselheiro.cadeira === "TITULAR") presentesT.push(dadosFormatados);
                        else presentesS.push(dadosFormatados);
                    } else {
                        ausentes.push(dadosFormatados);
                    }
                }
            });

            gerarHtmlPresentes(presentesT, presentesS);
            gerarHtmlAusentes(ausentes);
        }

        function gerarHtmlPresentes(titulares, suplentes) {
            titulares.sort((a, b) => a.nomeExibicao.localeCompare(b.nomeExibicao));
            suplentes.sort((a, b) => a.nomeExibicao.localeCompare(b.nomeExibicao));

            const format = (c) => `<b>${c.nomeExibicao}</b> (${c.entidade})`;
            
            let html = `<i>Titulares</i> — ${titulares.map(format).join('; ')}`;
            html += ` ● <i>Suplentes</i> — ${suplentes.map(format).join('; ')}`;

            document.getElementById('resultPresentes').innerHTML = html;
        }

        function gerarHtmlAusentes(ausentes) {
            const itens = ausentes.map(a => {
                const cargo = a.cadeira.charAt(0).toUpperCase() + a.cadeira.slice(1).toLowerCase();
                const seg = a.segmento.charAt(0).toUpperCase() + a.segmento.slice(1).toLowerCase();
                const mot = a.motivo.charAt(0).toUpperCase() + a.motivo.slice(1).toLowerCase();
                return `<b>${cargo}: ${a.nomeExibicao}</b>, ${a.entidade}. ${seg}. <i>Motivo:</i> ${mot}`;
            });

            document.getElementById('resultAusentes').innerHTML = itens.join('; ');
        }

        async function copyRichText(id) {
            const el = document.getElementById(id);
            const range = document.createRange();
            range.selectNode(el);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            
            try {
                document.execCommand('copy');
                window.getSelection().removeAllRanges();
                alert("Copiado com formatação! Agora cole no Docs.");
            } catch (err) {
                console.error('Erro ao copiar', err);
            }
        }

        function limpar() {
            document.getElementById('csvInput').value = '';
            document.getElementById('resultPresentes').innerHTML = '';
            document.getElementById('resultAusentes').innerHTML = '';
