<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Links - Secretaria Executiva</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fa;
    margin:0;
    padding:40px;
}

h1{
    text-align:center;
    color:#0b3d91;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    text-align:center;
    transition:0.2s;
}

.card:hover{
    transform:translateY(-5px);
}

a{
    text-decoration:none;
    color:#0b3d91;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>🔗 Painel Público de Páginas</h1>

<div class="grid" id="linksContainer"></div>

<script>
const usuario = "cmsmoc";
const repo = "secretariaexecutiva";
const branch = "main";

const apiURL = `https://api.github.com/repos/${usuario}/${repo}/git/trees/${branch}?recursive=1`;

fetch(apiURL)
.then(response => response.json())
.then(data => {

    const container = document.getElementById("linksContainer");

    const arquivosHTML = data.tree.filter(item => 
        item.path.endsWith(".html") && 
        item.path !== "links.html"
    );

    arquivosHTML.forEach(file => {

        const urlPublica = `https://${usuario}.github.io/${repo}/${file.path}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <a href="${urlPublica}" target="_blank">
                ${file.path}
            </a>
        `;

        container.appendChild(card);

    });

})
.catch(error => {
    console.error("Erro ao buscar arquivos:", error);
});
</script>

</body>
</html>
