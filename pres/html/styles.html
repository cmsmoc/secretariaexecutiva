<style>
/* ============================================================
   PRIVATE MUSIC FEEDBACK PLATFORM — Styles
   Dark · Refined · Spotify-inspired but distinct
   Fonts: Syne (display) + DM Sans (body)
   ============================================================ */

/* ── RESET & TOKENS ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0a0a0f;
  --bg-2:       #111118;
  --bg-3:       #18181f;
  --bg-card:    #141419;
  --bg-glass:   rgba(255,255,255,0.04);
  --border:     rgba(255,255,255,0.08);
  --border-md:  rgba(255,255,255,0.12);

  --text:       #f0f0f5;
  --text-2:     #a0a0b0;
  --text-3:     #5a5a70;

  --accent:     #c8ff57;      /* electric lime — the one memorable colour */
  --accent-dim: rgba(200,255,87,0.15);
  --accent-glow:rgba(200,255,87,0.3);

  --purple:     #7c5cbf;
  --pink:       #e05c8a;

  --radius-sm:  8px;
  --radius:     14px;
  --radius-lg:  22px;
  --radius-xl:  32px;

  --shadow-card: 0 8px 40px rgba(0,0,0,0.5);
  --shadow-glow: 0 0 60px var(--accent-glow);

  --ff-display: 'Syne', sans-serif;
  --ff-body:    'DM Sans', sans-serif;

  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  --spring:     0.4s cubic-bezier(0.34,1.56,0.64,1);
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 200px 200px;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

/* ── UTILITIES ───────────────────────────────────────────────── */
.hidden { display: none !important; }
.page { display: none; }
.page.active { display: block; }

/* ── HEADER ──────────────────────────────────────────────────── */
#app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.logo-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: none;
  padding: 0;
}
.logo-icon {
  font-size: 22px;
  color: var(--accent);
  animation: spin-slow 12s linear infinite;
}
@keyframes spin-slow { to { transform: rotate(360deg); } }
.logo-text {
  font-family: var(--ff-display);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.02em;
}

/* Mini player in header */
.mini-player {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px 6px 8px;
}
.mini-play {
  background: var(--accent);
  border: none;
  border-radius: 50%;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 10px;
  color: #000;
  transition: transform var(--transition);
}
.mini-play:hover { transform: scale(1.1); }
.mini-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-2);
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── GALLERY PAGE ───────────────────────────────────────────── */
#page-gallery { padding-bottom: 80px; }

.gallery-hero {
  max-width: 1280px;
  margin: 0 auto;
  padding: 64px 24px 40px;
}
.gallery-eyebrow {
  font-family: var(--ff-display);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}
.gallery-title {
  font-family: var(--ff-display);
  font-size: clamp(40px, 7vw, 80px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--text);
  margin-bottom: 12px;
}
.gallery-sub {
  font-size: 16px;
  color: var(--text-2);
  font-weight: 300;
}

.song-grid {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
}

/* ── SONG CARD ───────────────────────────────────────────────── */
.song-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
  animation: card-enter 0.5s both;
  position: relative;
}
@keyframes card-enter {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.song-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: var(--shadow-card), 0 0 0 1px var(--border-md);
  border-color: var(--border-md);
}
.song-card:hover .card-play { opacity: 1; transform: scale(1) translateY(0); }
.song-card:hover .card-cover-img { transform: scale(1.06); }

.card-cover-wrap {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
}
.card-cover-img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}
.card-cover-gradient {
  width: 100%; height: 100%;
  border-radius: 0;
}
.card-play {
  position: absolute;
  bottom: 12px; right: 12px;
  width: 44px; height: 44px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  opacity: 0;
  transform: scale(0.85) translateY(6px);
  transition: opacity var(--transition), transform var(--spring);
  box-shadow: 0 4px 20px rgba(200,255,87,0.4);
}
.card-play svg { width: 18px; height: 18px; fill: #000; }

.card-body {
  padding: 16px;
}
.card-title {
  font-family: var(--ff-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
  margin-bottom: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.card-rating {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 13px;
  color: var(--text-2);
}
.card-rating .star-val {
  color: var(--accent);
  font-weight: 600;
}
.card-reactions {
  display: flex;
  gap: 6px;
  font-size: 12px;
}
.card-reaction-item {
  display: flex;
  align-items: center;
  gap: 2px;
  color: var(--text-3);
}

/* ── SKELETON ────────────────────────────────────────────────── */
.skeleton-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: skeleton-pulse 1.6s ease-in-out infinite;
}
@keyframes skeleton-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.skel-cover {
  aspect-ratio: 1;
  background: var(--bg-3);
}
.skel-body { padding: 16px; }
.skel-line {
  height: 12px;
  background: var(--bg-3);
  border-radius: 6px;
  margin-bottom: 8px;
}
.skel-line.w70 { width: 70%; }
.skel-line.w90 { width: 90%; }
.skel-line.w55 { width: 55%; }
.skel-line.w80 { width: 80%; }
.skel-line.w40 { width: 40%; }
.skel-line.w60 { width: 60%; }

/* ── MUSIC PAGE ──────────────────────────────────────────────── */
#page-music { padding-bottom: 80px; }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 18px;
  color: var(--text-2);
  font-family: var(--ff-body);
  font-size: 14px;
  cursor: pointer;
  margin: 24px 24px 0;
  transition: color var(--transition), border-color var(--transition), background var(--transition);
}
.back-btn:hover {
  color: var(--text);
  border-color: var(--border-md);
  background: var(--bg-glass);
}

.music-layout {
  max-width: 1280px;
  margin: 32px auto;
  padding: 0 24px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  align-items: start;
}

/* ── COVER ART ───────────────────────────────────────────────── */
.cover-art-wrap {
  position: relative;
  width: 100%;
  max-width: 360px;
  margin: 0 auto 24px;
}
.cover-art {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  background: var(--bg-3);
}
.cover-art img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.cover-glow {
  position: absolute;
  inset: -20px;
  border-radius: var(--radius-xl);
  filter: blur(50px);
  opacity: 0.25;
  z-index: -1;
  transition: background 1s ease;
}

/* ── TRACK INFO ──────────────────────────────────────────────── */
.track-info { margin-bottom: 24px; }
.track-title {
  font-family: var(--ff-display);
  font-size: clamp(22px, 4vw, 34px);
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--text);
  line-height: 1.1;
}
.track-date {
  font-size: 13px;
  color: var(--text-3);
  margin-top: 6px;
  font-weight: 300;
}

/* ── WAVEFORM PLAYER ─────────────────────────────────────────── */
.player-wrap {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
#waveform {
  margin-bottom: 16px;
  min-height: 60px;
}
/* WaveSurfer canvas styling */
#waveform wave { border-radius: 4px; }

.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 14px;
}
.time-current, .time-total {
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: var(--text-3);
  min-width: 36px;
  text-align: center;
}
.play-btn {
  width: 52px; height: 52px;
  background: var(--accent);
  border: none;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform var(--spring), box-shadow var(--transition);
  box-shadow: 0 0 0 0 var(--accent-glow);
}
.play-btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 24px var(--accent-glow);
}
.play-btn:active { transform: scale(0.95); }
.play-btn svg {
  width: 22px; height: 22px;
  fill: #000;
}

.player-volume {
  display: flex;
  align-items: center;
  gap: 10px;
}
.vol-icon { font-size: 14px; }
#volume-slider {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
#volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  cursor: pointer;
  transition: transform var(--transition);
}
#volume-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

/* ── AUTHOR NOTES ────────────────────────────────────────────── */
.author-notes {
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 24px;
}
.section-label {
  font-family: var(--ff-display);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 14px;
}
#author-notes-text {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-2);
  font-weight: 300;
  white-space: pre-wrap;
}

/* ── FEEDBACK SECTION ────────────────────────────────────────── */
.feedback-section {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
}

.rating-display {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.rating-avg {
  font-family: var(--ff-display);
  font-size: 40px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -0.04em;
  line-height: 1;
}
.rating-stars { display: flex; gap: 3px; }
.rating-stars .star-lit { color: var(--accent); font-size: 16px; }
.rating-stars .star-dim { color: var(--text-3); font-size: 16px; }
.rating-count { font-size: 13px; color: var(--text-3); }

.reaction-display {
  display: flex;
  gap: 10px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.reaction-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 14px;
  color: var(--text-2);
  font-weight: 500;
}
.reaction-chip .emoji { font-size: 18px; }

/* ── FEEDBACK FORM ───────────────────────────────────────────── */
.feedback-form {
  border-top: 1px solid var(--border);
  padding-top: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-block {}
.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 10px;
}
.label-hint {
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
  color: var(--text-3);
  font-size: 11px;
  opacity: 0.7;
}

.star-picker {
  display: flex;
  gap: 6px;
}
.star {
  background: none;
  border: none;
  font-size: 28px;
  color: var(--text-3);
  cursor: pointer;
  transition: color var(--transition), transform var(--spring);
  line-height: 1;
  padding: 2px;
}
.star:hover, .star.active { color: var(--accent); }
.star:hover { transform: scale(1.2); }

.reaction-picker {
  display: flex;
  gap: 10px;
}
.reaction-btn {
  background: var(--bg-glass);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 18px;
  font-size: 22px;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition), transform var(--spring);
}
.reaction-btn:hover { transform: scale(1.12); }
.reaction-btn.active {
  border-color: var(--accent);
  background: var(--accent-dim);
}

.comment-input {
  width: 100%;
  background: var(--bg-glass);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 14px;
  padding: 12px 14px;
  resize: vertical;
  outline: none;
  transition: border-color var(--transition);
}
.comment-input::placeholder { color: var(--text-3); }
.comment-input:focus { border-color: var(--border-md); }

.submit-btn {
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  padding: 14px 28px;
  font-family: var(--ff-display);
  font-size: 15px;
  font-weight: 700;
  color: #000;
  cursor: pointer;
  letter-spacing: -0.01em;
  align-self: flex-start;
  transition: transform var(--spring), box-shadow var(--transition), opacity var(--transition);
}
.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--accent-glow);
}
.submit-btn:active { transform: scale(0.97); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.submit-msg {
  font-size: 14px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-weight: 500;
}
.submit-msg.success { background: rgba(200,255,87,0.1); color: var(--accent); }
.submit-msg.error { background: rgba(224,92,138,0.1); color: var(--pink); }

/* ── LYRICS PANEL ────────────────────────────────────────────── */
.music-right {
  position: sticky;
  top: 80px;
  max-height: calc(100vh - 100px);
  display: flex;
  flex-direction: column;
}
.lyrics-scroll {
  flex: 1;
  overflow-y: auto;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-3) transparent;
}
.lyrics-scroll::-webkit-scrollbar { width: 4px; }
.lyrics-scroll::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 2px; }
#lyrics-text {
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-2);
  white-space: pre-wrap;
  font-weight: 300;
}
.lyrics-empty {
  color: var(--text-3);
  font-style: italic;
  font-size: 14px;
}

/* ── TOAST ───────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--bg-3);
  border: 1px solid var(--border-md);
  border-radius: 100px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  z-index: 999;
  transition: transform 0.4s var(--spring), opacity var(--transition);
  opacity: 0;
  pointer-events: none;
  backdrop-filter: blur(20px);
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ── LOADING STATE ───────────────────────────────────────────── */
.lyrics-skeleton {
  display: flex;
  flex-direction: column;
  gap: 10px;
  animation: skeleton-pulse 1.6s ease-in-out infinite;
}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media (max-width: 900px) {
  .music-layout {
    grid-template-columns: 1fr;
    gap: 32px;
  }
  .music-right {
    position: static;
    max-height: 500px;
  }
}
@media (max-width: 600px) {
  .song-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  .gallery-hero { padding: 40px 16px 24px; }
  .music-layout { padding: 0 16px; }
  .back-btn { margin: 16px 16px 0; }
}
@media (max-width: 400px) {
  .song-grid { grid-template-columns: 1fr; }
}

/* ── PAGE TRANSITION ─────────────────────────────────────────── */
.page { animation: page-in 0.35s ease both; }
@keyframes page-in {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
