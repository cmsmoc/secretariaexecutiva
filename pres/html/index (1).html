<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>🎵 Ouça Agora</title>

  <!-- PWA Manifest injected dynamically via JS -->

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- WaveSurfer.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.7.3/wavesurfer.min.js"></script>

  <?!= include('styles'); ?>
</head>
<body data-page="<?= page ?>" data-music-id="<?= musicId ?>">

  <!-- App Shell -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div class="header-inner">
        <button class="logo-btn" id="btn-home" aria-label="Ir para galeria">
          <span class="logo-icon">◈</span>
          <span class="logo-text">ouça agora</span>
        </button>
        <div class="header-right">
          <span id="mini-player" class="mini-player hidden">
            <button class="mini-play" id="mini-play-btn" aria-label="Play/Pause">▶</button>
            <span class="mini-title" id="mini-title">—</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Page: Gallery -->
    <main id="page-gallery" class="page">
      <div class="gallery-hero">
        <p class="gallery-eyebrow">escuta particular</p>
        <h1 class="gallery-title">Músicas</h1>
        <p class="gallery-sub">Ouça, sinta e compartilhe o que achou.</p>
      </div>
      <div id="song-grid" class="song-grid" role="list">
        <!-- Skeleton cards injected by JS -->
      </div>
    </main>

    <!-- Page: Music Detail -->
    <main id="page-music" class="page hidden">
      <button class="back-btn" id="btn-back" aria-label="Voltar">
        <span>←</span> <span>Galeria</span>
      </button>

      <div class="music-layout">

        <!-- LEFT: Player -->
        <section class="music-left" aria-label="Player de áudio">

          <!-- Cover art -->
          <div class="cover-art-wrap" id="cover-art-wrap">
            <div class="cover-art" id="cover-art"></div>
            <div class="cover-glow" id="cover-glow"></div>
          </div>

          <!-- Track info -->
          <div class="track-info">
            <h2 class="track-title" id="track-title">—</h2>
            <p class="track-date" id="track-date"></p>
          </div>

          <!-- Waveform player -->
          <div class="player-wrap">
            <div id="waveform"></div>

            <div class="player-controls">
              <span class="time-current" id="time-current">0:00</span>
              <button class="play-btn" id="play-btn" aria-label="Play/Pause">
                <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                <svg class="icon-pause hidden" viewBox="0 0 24 24"><rect x="6" y="3" width="4" height="18"/><rect x="14" y="3" width="4" height="18"/></svg>
              </button>
              <span class="time-total" id="time-total">0:00</span>
            </div>

            <div class="player-volume">
              <span class="vol-icon">🔈</span>
              <input type="range" id="volume-slider" min="0" max="1" step="0.02" value="0.8" aria-label="Volume" />
              <span class="vol-icon">🔊</span>
            </div>
          </div>

          <!-- Author notes -->
          <div class="author-notes" id="author-notes-wrap">
            <h3 class="section-label">notas do artista</h3>
            <p id="author-notes-text"></p>
          </div>

          <!-- Feedback -->
          <div class="feedback-section" id="feedback-section">
            <h3 class="section-label">o que você achou?</h3>

            <!-- Rating display -->
            <div class="rating-display" id="rating-display">
              <div class="rating-avg" id="rating-avg">—</div>
              <div class="rating-stars" id="rating-stars-display"></div>
              <div class="rating-count" id="rating-count"></div>
            </div>

            <!-- Reaction counts -->
            <div class="reaction-display" id="reaction-display"></div>

            <!-- Submission form -->
            <div class="feedback-form" id="feedback-form">
              <div class="form-block">
                <label class="form-label">sua nota</label>
                <div class="star-picker" id="star-picker" role="group" aria-label="Avaliação de 1 a 5 estrelas">
                  <button class="star" data-val="1" aria-label="1 estrela">★</button>
                  <button class="star" data-val="2" aria-label="2 estrelas">★</button>
                  <button class="star" data-val="3" aria-label="3 estrelas">★</button>
                  <button class="star" data-val="4" aria-label="4 estrelas">★</button>
                  <button class="star" data-val="5" aria-label="5 estrelas">★</button>
                </div>
              </div>

              <div class="form-block">
                <label class="form-label">reação</label>
                <div class="reaction-picker" id="reaction-picker" role="group" aria-label="Escolha uma reação">
                  <button class="reaction-btn" data-val="👍" aria-label="Curtir">👍</button>
                  <button class="reaction-btn" data-val="🔥" aria-label="Fogo">🔥</button>
                  <button class="reaction-btn" data-val="💭" aria-label="Pensativo">💭</button>
                </div>
              </div>

              <div class="form-block">
                <label class="form-label" for="comment-input">comentário <span class="label-hint">(privado)</span></label>
                <textarea id="comment-input" class="comment-input" rows="3" maxlength="1000"
                  placeholder="Só o artista vai ler isso..."></textarea>
              </div>

              <button class="submit-btn" id="submit-btn">Enviar feedback</button>
              <p class="submit-msg hidden" id="submit-msg"></p>
            </div>
          </div>

        </section>

        <!-- RIGHT: Lyrics -->
        <section class="music-right" aria-label="Letra da música">
          <h3 class="section-label">letra</h3>
          <div class="lyrics-scroll" id="lyrics-scroll">
            <div class="lyrics-skeleton">
              <div class="skel-line w70"></div>
              <div class="skel-line w90"></div>
              <div class="skel-line w55"></div>
              <div class="skel-line w80"></div>
              <div class="skel-line w40"></div>
            </div>
          </div>
        </section>

      </div>
    </main>

    <!-- Toast notification -->
    <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  </div><!-- /#app -->

  <?!= include('app'); ?>

</body>
</html>
