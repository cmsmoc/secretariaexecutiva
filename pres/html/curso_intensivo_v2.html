<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Curso Intensivo — Saúde Pública & WebApps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f9f7f3;--bg2:#f0ece3;--bg3:#e5dfd2;--bg4:#d8d0bf;
  --ink:#1c1b18;--ink2:#4b4a42;--ink3:#8a8780;--ink4:#bdb8ac;
  --b-teal:#0a6e62;--l-teal:#e3f5f2;--m-teal:#5bbdb0;
  --b-amber:#9a4f00;--l-amber:#fff4e6;--m-amber:#f5a623;
  --b-blue:#1a3a6e;--l-blue:#e8f0ff;--m-blue:#4a7eff;
  --b-red:#8b1a1a;--l-red:#fef0f0;
  --b-green:#1a5c35;--l-green:#eaf5ef;--m-green:#4caf7d;
  --b-purple:#4a1a7a;--l-purple:#f3eeff;--m-purple:#9b5de5;
  --line:rgba(28,27,24,.09);--line2:rgba(28,27,24,.05);
  --serif:'Playfair Display',Georgia,serif;
  --body:'Plus Jakarta Sans',system-ui,sans-serif;
  --mono:'JetBrains Mono',monospace;
  --rad:8px;--rad-lg:14px;
  --sh:0 2px 16px rgba(0,0,0,.06);--sh2:0 4px 28px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.68;overflow-x:hidden;}

/* ── PROGRESS BAR ── */
#pgbar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--bg3);z-index:300;}
#pgfill{height:100%;width:0%;background:linear-gradient(90deg,var(--b-teal),var(--m-amber));transition:width .5s ease;}

/* ── LAYOUT ── */
.shell{display:grid;grid-template-columns:300px 1fr;min-height:100vh;padding-top:3px;}

/* ══════════════════ SIDEBAR ══════════════════ */
.sb{
  background:var(--ink);color:#fff;
  position:sticky;top:3px;height:calc(100vh - 3px);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-top{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{font-family:var(--serif);font-size:16px;font-weight:700;line-height:1.2;letter-spacing:-.01em;}
.sb-logo .hi{color:var(--m-amber);}
.sb-tagline{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase;margin-top:6px;}

/* Global progress */
.sb-gp{padding:14px 22px;border-bottom:1px solid rgba(255,255,255,.07);}
.gp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.gp-label{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.08em;text-transform:uppercase;}
.gp-pct{font-family:var(--mono);font-size:12px;color:var(--m-amber);font-weight:500;}
.gp-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.gp-fill{height:100%;background:linear-gradient(90deg,var(--b-teal),var(--m-amber));transition:width .5s;}

/* Module switcher */
.sb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-tab{
  flex:1;padding:11px 6px;text-align:center;
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:rgba(255,255,255,.35);border-bottom:2px solid transparent;
  transition:all .15s;cursor:pointer;
}
.sb-tab:hover{color:rgba(255,255,255,.7);}
.sb-tab.on{color:#fff;border-bottom-color:var(--m-amber);}
.sb-tab.on.a-mod{border-bottom-color:var(--m-teal);}

/* Nav list */
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-nav::-webkit-scrollbar{width:2px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);}
.nav-phase{
  padding:12px 22px 4px;
  font-family:var(--mono);font-size:9px;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,.25);
  display:flex;align-items:center;gap:8px;
}
.nav-phase::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06);}
.nav-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:8px 22px;cursor:pointer;
  transition:background .12s;border-left:2px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.04);}
.nav-item.cur{background:rgba(255,255,255,.07);border-left-color:var(--m-teal);}
.nav-item.cur.b-cur{border-left-color:var(--m-amber);}
.nav-item.fin .ni-dot{background:var(--m-teal);border-color:var(--m-teal);}
.nav-item.fin.b-item .ni-dot{background:var(--m-amber);border-color:var(--m-amber);}
.ni-dot{
  width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);
  flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;
  font-size:7px;transition:all .2s;
}
.ni-txt{flex:1;}
.ni-title{font-size:12px;color:rgba(255,255,255,.7);line-height:1.35;transition:color .12s;}
.nav-item:hover .ni-title,.nav-item.cur .ni-title{color:#fff;}
.ni-badge{
  font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.25);
  letter-spacing:.05em;text-transform:uppercase;display:block;margin-top:2px;
}

.sb-foot{padding:14px 22px;border-top:1px solid rgba(255,255,255,.07);}
.gq-btn{
  width:100%;padding:9px 14px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:var(--rad);
  color:rgba(255,255,255,.6);font-family:var(--mono);font-size:10px;
  letter-spacing:.06em;text-align:center;cursor:pointer;transition:all .15s;
}
.gq-btn:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ══════════════════ MAIN ══════════════════ */
.main{display:flex;flex-direction:column;min-height:calc(100vh - 3px);}

/* Lesson chrome */
.lc{
  position:sticky;top:3px;z-index:50;
  background:var(--bg);border-bottom:1px solid var(--line);
  padding:18px 52px 14px;
}
.lc-crumb{
  font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.06em;
  margin-bottom:8px;display:flex;gap:5px;align-items:center;
}
.lc-crumb .sep{opacity:.4;}
.lc-row{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;}
.lc-badge{
  padding:3px 10px;border-radius:20px;
  font-family:var(--mono);font-size:10px;letter-spacing:.06em;font-weight:500;flex-shrink:0;
}
.bd-aula{background:var(--l-teal);color:var(--b-teal);}
.bd-mapa{background:var(--l-blue);color:var(--b-blue);}
.bd-quiz{background:var(--l-amber);color:var(--b-amber);}
.bd-ex{background:var(--l-green);color:var(--b-green);}
.bd-gq{background:var(--ink);color:#fff;}
.lc-title{font-family:var(--serif);font-size:clamp(18px,2.5vw,26px);font-weight:700;line-height:1.15;letter-spacing:-.01em;}
.lc-title.amb{color:var(--b-amber);}

/* Lesson progress */
.lp{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 52px;}
.lp-inner{display:flex;align-items:center;gap:14px;padding:10px 0;}
.lp-lbl{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.lp-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lp-bar-fill{height:100%;border-radius:2px;transition:width .5s;}
.lp-teal{background:var(--b-teal);}
.lp-amber{background:var(--m-amber);}
.lp-n{font-family:var(--mono);font-size:10px;color:var(--ink3);min-width:30px;text-align:right;}

/* ══════════════════ CONTENT AREA ══════════════════ */
.content{flex:1;padding:44px 52px;max-width:820px;}

/* ── MAP OPENER ── */
.map-opener{
  background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);
  padding:28px 32px;margin:0 0 28px;box-shadow:var(--sh);
  display:flex;gap:24px;align-items:flex-start;
}
.mo-icon{font-size:36px;flex-shrink:0;margin-top:2px;}
.mo-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--b-teal);margin-bottom:6px;}
.mo-label.amb{color:var(--b-amber);}
.mo-title{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:8px;line-height:1.2;}
.mo-desc{font-size:14px;color:var(--ink2);line-height:1.65;}

/* ── SVG DIAGRAMS ── */
.diag{
  border:1px solid var(--line);border-radius:var(--rad-lg);overflow:hidden;
  margin:20px 0;background:#fff;box-shadow:var(--sh);
}
.diag svg{display:block;width:100%;height:auto;}
.diag-caption{
  padding:10px 18px;background:var(--bg2);border-top:1px solid var(--line);
  font-family:var(--mono);font-size:11px;color:var(--ink3);
}

/* ── CONCEPT CARDS ── */
.cc{
  background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);
  padding:26px 30px;margin:20px 0;box-shadow:var(--sh);
}
.cc-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--b-teal);margin-bottom:10px;}
.cc-lbl.amb{color:var(--b-amber);}
.cc h3{font-family:var(--serif);font-size:21px;font-weight:700;margin-bottom:10px;line-height:1.2;}
.cc p{font-size:14px;color:var(--ink2);line-height:1.72;margin-bottom:8px;}
.cc p:last-child{margin-bottom:0;}

/* ── VOCAB GRID ── */
.vg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0;}
.vi{background:var(--bg2);border-radius:var(--rad);padding:14px 16px;border-left:3px solid var(--b-teal);}
.vi.amb{border-left-color:var(--b-amber);}
.vi.blu{border-left-color:var(--b-blue);}
.vi.grn{border-left-color:var(--b-green);}
.vi.pur{border-left-color:var(--b-purple);}
.vt{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.vd{font-size:12px;color:var(--ink3);line-height:1.55;}

/* ── ANALOGY ── */
.al{border-left:3px solid var(--b-teal);padding:14px 18px;margin:16px 0;border-radius:0 var(--rad) var(--rad) 0;background:var(--l-teal);font-size:14px;color:var(--ink2);line-height:1.65;}
.al.amb{border-left-color:var(--b-amber);background:var(--l-amber);}
.al .al-label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;color:var(--b-teal);display:block;margin-bottom:5px;}
.al.amb .al-label{color:var(--b-amber);}

/* ── CALLOUT ── */
.call{border-radius:var(--rad);padding:14px 18px;margin:16px 0;font-size:14px;line-height:1.65;}
.call-info{background:var(--l-blue);color:var(--b-blue);}
.call-warn{background:var(--l-amber);color:var(--b-amber);}
.call-tip{background:var(--l-green);color:var(--b-green);}
.call-key{background:var(--ink);color:#fff;}
.call .cl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;display:block;margin-bottom:5px;opacity:.7;}
.call strong{font-weight:600;}

/* ── CODE ── */
.code{background:#1c1b18;border-radius:var(--rad);padding:18px 22px;margin:16px 0;font-family:var(--mono);font-size:12px;color:#c8e6c9;line-height:1.85;overflow-x:auto;}
.ck{color:#80cbc4;}.cv{color:#ffcc80;}.cs{color:#a5d6a7;}.cm{color:rgba(255,255,255,.28);}

/* ── EXERCISE ── */
.ex{background:#fff;border:2px solid var(--m-green);border-radius:var(--rad-lg);padding:24px 28px;margin:24px 0;box-shadow:var(--sh);}
.ex-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--b-green);margin-bottom:8px;font-weight:500;}
.ex h3{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:10px;}
.ex-desc{font-size:14px;color:var(--ink2);line-height:1.68;margin-bottom:16px;}
.ex-steps{display:flex;flex-direction:column;gap:10px;}
.ex-step{display:flex;gap:12px;align-items:flex-start;}
.ex-n{min-width:22px;height:22px;border-radius:50%;background:var(--b-green);color:#fff;font-family:var(--mono);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;}
.ex-t{font-size:13px;color:var(--ink2);line-height:1.6;}
.ex-hint{margin-top:14px;padding:11px 14px;background:var(--l-green);border-radius:var(--rad);font-size:13px;color:var(--b-green);}

/* ── H2/H3 ── */
.content h2{font-family:var(--serif);font-size:22px;font-weight:700;margin:30px 0 12px;color:var(--ink);}
.content h3{font-family:var(--serif);font-size:18px;font-weight:700;margin:22px 0 8px;color:var(--ink);}
.content p{font-size:14px;color:var(--ink2);line-height:1.72;margin-bottom:12px;}
.content ul,.content ol{padding-left:20px;margin:10px 0;}
.content li{font-size:14px;color:var(--ink2);line-height:1.68;margin-bottom:4px;}
.content strong{font-weight:600;color:var(--ink);}
.sep{height:1px;background:var(--line);margin:28px 0;}

/* ── TAGS / PILLS ── */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-family:var(--mono);font-size:10px;font-weight:500;margin:2px 3px 2px 0;}
.p-teal{background:var(--l-teal);color:var(--b-teal);}
.p-amber{background:var(--l-amber);color:var(--b-amber);}
.p-blue{background:var(--l-blue);color:var(--b-blue);}
.p-green{background:var(--l-green);color:var(--b-green);}

/* ══════════════════ QUIZ ══════════════════ */
.qz{padding:40px 52px;max-width:820px;}
.qz-title{font-family:var(--serif);font-size:24px;font-weight:700;margin-bottom:6px;}
.qz-sub{font-size:14px;color:var(--ink3);margin-bottom:28px;}
.qb{background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);padding:22px 26px;margin-bottom:14px;box-shadow:var(--sh);}
.qb-num{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.07em;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.qb-q{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:14px;line-height:1.45;}
.q-opts{display:flex;flex-direction:column;gap:7px;}
.q-opt{
  padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--rad);
  font-size:13px;color:var(--ink2);text-align:left;background:#fff;
  transition:all .12s;display:flex;align-items:center;gap:10px;cursor:pointer;
}
.q-opt:hover:not(:disabled){border-color:var(--b-teal);background:var(--l-teal);color:var(--ink);}
.q-opt:hover:not(:disabled) .opt-i{border-color:var(--b-teal);}
.q-opt.ok{border-color:var(--b-green)!important;background:var(--l-green)!important;color:var(--b-green)!important;}
.q-opt.no{border-color:var(--b-red)!important;background:var(--l-red)!important;color:var(--b-red)!important;}
.opt-i{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--ink4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-family:var(--mono);}
.q-exp{margin-top:10px;padding:11px 14px;background:var(--l-teal);border-radius:var(--rad);font-size:13px;color:var(--b-teal);line-height:1.6;display:none;}
.q-exp.vis{display:block;}
.qz-res{background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);padding:32px;text-align:center;margin-top:20px;display:none;box-shadow:var(--sh);}
.qz-res.vis{display:block;}
.res-big{font-family:var(--serif);font-size:52px;font-weight:700;color:var(--b-teal);}
.res-lbl{font-size:13px;color:var(--ink3);margin-bottom:16px;}
.res-msg{font-size:15px;color:var(--ink2);line-height:1.6;margin-bottom:24px;}
.res-acts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* ── BUTTONS ── */
.btn{padding:10px 22px;border-radius:var(--rad);font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;transition:all .15s;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn-teal{background:var(--b-teal);color:#fff;}
.btn-teal:hover{background:#085047;}
.btn-amber{background:var(--b-amber);color:#fff;}
.btn-amber:hover{background:#7a3e00;}
.btn-ghost{background:var(--bg2);color:var(--ink2);border:1px solid var(--line);}
.btn-ghost:hover{background:var(--bg3);color:var(--ink);}
.btn-sm{padding:7px 14px;font-size:10px;}

/* ── BOTTOM NAV ── */
.lesson-foot{
  padding:20px 52px 36px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--line);
}
.done-btn{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:var(--rad);
  border:1.5px solid var(--b-teal);color:var(--b-teal);
  background:transparent;font-family:var(--mono);font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;
}
.done-btn.on{background:var(--b-teal);color:#fff;border-color:var(--b-teal);}
.done-btn:hover{background:var(--b-teal);color:#fff;}
.done-btn.amb{border-color:var(--b-amber);color:var(--b-amber);}
.done-btn.amb:hover,.done-btn.amb.on{background:var(--b-amber);color:#fff;border-color:var(--b-amber);}
.pn{display:flex;gap:8px;}

/* ── WELCOME ── */
.welcome{padding:56px 52px;max-width:820px;}
.welcome h1{font-family:var(--serif);font-size:clamp(32px,4vw,54px);font-weight:800;line-height:1.0;letter-spacing:-.02em;margin-bottom:18px;}
.welcome h1 em{font-style:italic;color:var(--b-teal);}
.w-desc{font-size:16px;color:var(--ink2);line-height:1.75;margin-bottom:32px;max-width:600px;}
.w-mods{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px;}
.w-mod{background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);padding:22px 24px;box-shadow:var(--sh);}
.w-mod.a{border-top:3px solid var(--b-teal);}
.w-mod.b{border-top:3px solid var(--b-amber);}
.wm-n{font-family:var(--mono);font-size:9px;color:var(--ink3);letter-spacing:.1em;margin-bottom:7px;}
.wm-t{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:6px;}
.wm-d{font-size:12px;color:var(--ink3);line-height:1.6;margin-bottom:10px;}
.wm-s{display:flex;gap:12px;}
.wm-st{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.wm-st span{color:var(--ink);font-weight:500;}
.w-acts{display:flex;gap:10px;flex-wrap:wrap;}

/* ── PHASE MAP ── */
.phase-map{background:#fff;border:1px solid var(--line);border-radius:var(--rad-lg);padding:26px 30px;margin:20px 0;box-shadow:var(--sh);}
.pm-title{font-family:var(--serif);font-size:19px;font-weight:700;margin-bottom:18px;}
.pm-phases{display:flex;flex-direction:column;gap:0;}
.pm-phase{
  display:grid;grid-template-columns:90px 1fr;gap:0;position:relative;
}
.pm-phase::before{content:'';position:absolute;left:82px;top:30px;bottom:0;width:1px;background:var(--line);}
.pm-phase:last-child::before{display:none;}
.pm-period{font-family:var(--mono);font-size:11px;color:var(--b-teal);padding:18px 0;letter-spacing:.04em;}
.pm-period.amb{color:var(--b-amber);}
.pm-body{padding:14px 0 20px 22px;border-left:1px solid var(--line);}
.pm-dot{width:10px;height:10px;border-radius:50%;background:var(--b-teal);position:absolute;left:78px;top:20px;}
.pm-dot.amb{background:var(--b-amber);}
.pm-name{font-size:14px;font-weight:500;color:var(--ink);margin-bottom:6px;}
.pm-items{display:flex;flex-direction:column;gap:4px;}
.pm-it{font-size:12px;color:var(--ink3);display:flex;gap:6px;}
.pm-it::before{content:'→';color:var(--b-teal);font-family:var(--mono);font-size:10px;flex-shrink:0;}
.pm-it.amb::before{color:var(--b-amber);}

/* ── STICKY DISCOVER PROMPT ── */
.discover-prompt{

            badge:'bd-aula', badgeTxt:'Micro-aula · 15 min',
            content:`
<div class="discover-prompt">
  <div class="dp-lbl">Descoberta ativa</div>
  <div class="dp-q">Um gestor de saúde te pede "um dashboard útil". Que número você colocaria em destaque? Antes de ler, pense: qual informação faria um secretário de saúde tomar uma decisão agora?</div>

<div class="cc">
  <div class="cc-lbl amb">Gestão por indicadores</div>
  <h3>Indicadores são a linguagem de todo gestor de saúde</h3>
  <p>Todo gestor da SMS pensa em metas, coberturas e taxas. Dominar esse vocabulário é falar na língua deles — e entregar dashboards que eles realmente usam.</p>

<div class="vg">
  <div class="vi amb"><div class="vt">Cobertura vacinal</div><div class="vd">% da população-alvo vacinada. Meta: 95%. Abaixo de 70% = alerta de surto. Montes Claros é endêmica para dengue — dado crítico.</div></div>

  <div class="vi"><div class="vt">RDQA</div><div class="vd">Razão de Digitação e Qualidade de Ações. Mede qualidade do preenchimento do e-SUS. Dado ruim no e-SUS = punição financeira federal.</div></div>
  <div class="vi"><div class="vt">Produção das equipes</div><div class="vd">Quantas consultas, visitas domiciliares e procedimentos cada equipe ESF realizou. Base para avaliação e planejamento de recursos.</div></div>
  <div class="vi grn"><div class="vt">SISPACTO</div><div class="vd">Sistema de monitoramento das metas pactuadas entre município, estado e federal. É o "boletim escolar" da SMS — metas ruins = menos recursos.</div></div>
  <div class="vi grn"><div class="vt">Previne Brasil</div><div class="vd">Programa que vincula $ federal ao desempenho em 7 indicadores de APS. Gestores monitora isso diariamente. É o principal driver financeiro atual.</div></div>

<h2>Os 5 indicadores mais cobrados hoje</h2>
<div class="call call-warn"><span class="cl">Indicadores que determinam o repasse federal agora</span>
<strong>1. Proporção de gestantes com pré-natal no 1º trimestre</strong> — meta: 60%<br>

<strong>3. Cobertura de vacinação em crianças</strong> — especialmente pentavalente e sarampo<br>
<strong>4. Proporção de hipertensos com pressão controlada</strong> — meta: 70%<br>

<div class="cc">
  <div class="cc-lbl amb">Segurança jurídica</div>
  <h3>Dados de saúde são categoria especial — e você tem vantagem aqui</h3>
  <p>Como bacharel em Direito, você pode ler a LGPD e entender implicações que técnicos de TI normalmente ignoram. Isso é diferencial competitivo real — e responsabilidade concreta.</p>

<div class="vg">
  <div class="vi blu"><div class="vt">Dado pessoal sensível</div><div class="vd">Categoria especial da LGPD. Dados de saúde, raça, religião, biometria, genética. Proteção reforçada — bases legais mais restritas.</div></div>
  <div class="vi blu"><div class="vt">Bases legais para saúde pública</div><div class="vd">"Tutela da saúde" e "interesse público" são as bases que geralmente dispensam consentimento para ações de saúde pública. Art. 11, II, f e g da LGPD.</div></div>
  <div class="vi"><div class="vt">Anonimização</div><div class="vd">Remove identificação permanentemente. Dado anônimo não é "dado pessoal" — pode ser usado livremente para análise e dashboards públicos.</div></div>
  <div class="vi"><div class="vt">Pseudonimização</div><div class="vd">Substitui identificadores por códigos. Dado ainda é pessoal mas com proteção adicional. Ex: trocar CPF por hash interno.</div></div>
  <div class="vi grn"><div class="vt">DPO / Encarregado</div><div class="vd">Responsável pelo compliance LGPD na organização. A SMS deve ter um. Seus projetos de integração precisam passar por ele.</div></div>
  <div class="vi grn"><div class="vt">Log de auditoria</div><div class="vd">Registro de quem acessou dado de saúde, quando e para quê. Obrigatório para dados sensíveis. Você já sabe construir isso — é um sistema de auditoria.</div></div>
</div>

<div class="call call-warn"><span class="cl">Regra prática para seus sistemas</span>
<strong>Dashboard público com dados agregados e anonimizados:</strong> pode. Exemplo: "327 casos de dengue no bairro X em junho" — sem CPF, sem nome.<br>
<strong>Dados individuais de pacientes:</strong> base legal obrigatória, acesso restrito, log de acesso.<br>

<div class="cc">

  <p>IA na saúde pública não é robô cirurgião nem diagnóstico automático. Na maioria dos casos práticos e de alto impacto, é automação de análise, alertas inteligentes e integração de dados dispersos. Isso você já sabe fazer.</p>

<div class="discover-prompt">
  <div class="dp-lbl">Descoberta ativa</div>
  <div class="dp-q">Seu sistema do Conselho. Pense: quais são as 4 coisas básicas que qualquer pessoa faz com dados — adicionar, ver, mudar e apagar. Você consegue identificar onde cada uma acontece no seu PWA?</div>
</div>

<div class="cc">
  <div class="cc-lbl">CRUD — Create Read Update Delete</div>
  <h3>95% dos sistemas do mundo são variações de 4 operações</h3>
</div>

<div class="vg">
  <div class="vi"><div class="vt">C — Create (Criar)</div><div class="vd">Adicionar novo dado. Ex: conselheiro confirma presença → nova linha na planilha.</div></div>
  <div class="vi"><div class="vt">R — Read (Ler)</div><div class="vd">Buscar e exibir dados. Ex: carregar lista de presença, mostrar documentos da biblioteca.</div></div>
  <div class="vi"><div class="vt">U — Update (Atualizar)</div><div class="vd">Modificar dado existente. Ex: corrigir nome de conselheiro, atualizar status de deliberação.</div></div>
  <div class="vi"><div class="vt">D — Delete (Deletar)</div><div class="vd">Remover dado. Ex: excluir inscrição duplicada, remover documento desatualizado.</div></div>
</div>

<div class="code">
<span class="cm">// CREATE — novo registro de presença</span><br>
planilha.<span class="ck">appendRow</span>([nome, cpf, timestamp]);<br><br>
<span class="cm">// READ — carregar lista para exibir</span><br>
<span class="cv">const</span> dados = planilha.<span class="ck">getDataRange</span>().<span class="ck">getValues</span>();<br><br>
<span class="cm">// UPDATE — corrigir um campo</span><br>
planilha.<span class="ck">getRange</span>(linha, coluna).<span class="ck">setValue</span>(novoValor);<br><br>
<span class="cm">// DELETE — remover linha</span><br>
planilha.<span class="ck">deleteRow</span>(numeroLinha);
</div>

<div class="call call-tip"><span class="cl">Como usar CRUD no briefing de um projeto</span>
Quando receber um pedido de sistema, primeira pergunta: <strong>"Quais dados precisam de CRUD?"</strong> A resposta define 90% do escopo. Se o cliente não sabe responder, você conduz com: "Quem vai adicionar dados? Quem vai ver? Alguém vai editar ou apagar?"
</div>`

<div class="cc">
  <div class="cc-lbl">Estado e comunicação</div>
  <h3>Estado é a "memória atual" do sistema — APIs são como os sistemas se comunicam</h3>
</div>

<div class="vg">
  <div class="vi"><div class="vt">Estado na planilha (banco)</div><div class="vd">Persistente. Sobrevive ao fechar o navegador. Ex: quem está inscrito, qual reunião aconteceu.</div></div>
  <div class="vi"><div class="vt">Estado na tela (frontend/JS)</div><div class="vd">Temporário. Some quando a página recarrega. Ex: campos preenchidos agora, filtros ativos.</div></div>
  <div class="vi grn"><div class="vt">API (Application Programming Interface)</div><div class="vd">O "protocolo de conversa" entre sistemas. Define o que pode ser pedido, em que formato, e o que será devolvido.</div></div>
  <div class="vi grn"><div class="vt">Webhook</div><div class="vd">API "ao contrário" — o servidor avisa o cliente quando algo acontece. Ex: e-SUS avisa seu sistema quando nova notificação de dengue é registrada.</div></div>
</div>

<div class="al"><span class="al-label">Analogia — Webhook vs API tradicional</span>
<strong>API tradicional:</strong> você liga para o banco todo dia perguntando "chegou algum pagamento?" Isso é ineficiente.<br>
<strong>Webhook:</strong> você cadastra um número e o banco te liga só quando algo acontece. Muito mais eficiente — e é assim que alertas epidemiológicos automáticos funcionam.
</div>

<div class="call call-warn"><span class="cl">Bugs de estado são os mais traiçoeiros</span>
Quando algo "sumiu misteriosamente" no seu sistema, é quase sempre bug de estado: o que está na tela não reflete o que está na planilha. Pergunta-chave: <strong>"Onde esse dado deveria viver — na tela (temporário) ou na planilha (permanente)?"</strong>
</div>`

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let activeMod = 'b'; // Saúde é prioritário — começa aqui
let curLesson = null;
let done = new Set(JSON.parse(localStorage.getItem('ci-done') || '[]'));

function allLessons(mod) {
  return CUR[mod].phases.flatMap(p => p.lessons);
}
function totalLessons() {
  return allLessons('a').length + allLessons('b').length;
}
function saveProgress() {
  localStorage.setItem('ci-done', JSON.stringify([...done]));
  const pct = Math.round((done.size / totalLessons()) * 100);
  document.getElementById('gp-fill').style.width = pct + '%';
  document.getElementById('gp-pct').textContent = pct + '%';
  document.getElementById('pgfill').style.width = pct + '%';
}
function modPct(mod) {
  const all = allLessons(mod);
  const cnt = all.filter(l => done.has(l.id)).length;
  return Math.round((cnt / all.length) * 100);
}
function getLesson(id) {
  for (const m of ['a', 'b']) {
    for (const p of CUR[m].phases) {
      for (const l of p.lessons) {
        if (l.id === id) return { lesson: l, mod: m };
      }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════
function renderNav() {
  const nav = document.getElementById('sb-nav');
  nav.innerHTML = '';
  const mod = CUR[activeMod];
  const isB = activeMod === 'b';
  mod.phases.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = 'nav-phase';
    ph.textContent = phase.label;
    nav.appendChild(ph);
    phase.lessons.forEach(l => {
      const el = document.createElement('div');
      const isDone = done.has(l.id);
      const isCur = curLesson === l.id;
      el.className = `nav-item${isCur ? ' cur' + (isB ? ' b-cur' : '') : ''}${isDone ? ' fin' + (isB ? ' b-item' : '') : ''}`;
      const typeMap = { aula: 'aula', mapa: 'mapa visual', quiz: 'quiz', exercicio: 'exercício' };
      el.innerHTML = `<div class="ni-dot">${isDone ? '✓' : ''}</div>
        <div class="ni-txt">
          <div class="ni-title">${l.title}</div>
          <span class="ni-badge">${typeMap[l.type] || l.type}</span>
        </div>`;
      el.onclick = () => goTo(l.id);
      nav.appendChild(el);
    });
  });
}
function switchTab(mod) {
  activeMod = mod;
  document.getElementById('tab-a').classList.toggle('on', mod === 'b');
  document.getElementById('tab-a').classList.toggle('a-mod', mod === 'b');
  document.getElementById('tab-b').classList.toggle('on', mod === 'a');
  document.getElementById('tab-b').classList.toggle('a-mod', false);
  renderNav();
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function flatAll() {
  return [...allLessons('b'), ...allLessons('a')];
}
function goTo(id) {
  if (id === '__gq__') { showQuizGeral(); curLesson = '__gq__'; return; }
  const found = getLesson(id);
  if (!found) return;
  curLesson = id;
  activeMod = found.mod;
  // sync tab
  if (found.mod === 'b') {
    document.getElementById('tab-a').classList.add('on', 'a-mod');
    document.getElementById('tab-b').classList.remove('on');
  } else {
    document.getElementById('tab-b').classList.add('on');
    document.getElementById('tab-a').classList.remove('on', 'a-mod');
  }
  renderNav();
  const l = found.lesson;
  if (l.type === 'quiz') renderQuiz(l, found.mod);
  else renderLesson(l, found.mod);
  window.scrollTo(0, 0);
}
function prevNext(dir) {
  const all = flatAll();
  const idx = all.findIndex(l => l.id === curLesson);
  if (idx < 0) return;
  const n = all[idx + dir];
  if (n) goTo(n.id);
}
function markDone(id, btn) {
  if (done.has(id)) done.delete(id);
  else done.add(id);
  const on = done.has(id);
  btn.className = `done-btn${on ? ' on' : ''}${id.startsWith('b') ? ' amb' : ''}`;
  btn.textContent = on ? '✓ Concluído' : 'Marcar como concluído';
  saveProgress();
  renderNav();
}

// ═══════════════════════════════════════════════════
// RENDER LESSON
// ═══════════════════════════════════════════════════
function chrome(l, mod) {
  const isB = mod === 'b';
  const phaseLabel = (() => {
    for (const p of CUR[mod].phases)
      for (const a of p.lessons)
        if (a.id === l.id) return p.label;
    return '';
  })();
  const pct = modPct(mod);
  return `
<div class="lc">
  <div class="lc-crumb"><span>${CUR[mod].label}</span><span class="sep">/</span><span>${phaseLabel}</span></div>
  <div class="lc-row">
    <span class="lc-badge ${l.badge}">${l.badgeTxt}</span>
  </div>
  <div class="lc-title${isB ? ' amb' : ''}">${l.title}</div>
</div>
<div class="lp">
  <div class="lp-inner">
    <span class="lp-lbl">Progresso do módulo</span>
    <div class="lp-bar"><div class="lp-bar-fill ${isB ? 'lp-amber' : 'lp-teal'}" style="width:${pct}%"></div></div>
    <span class="lp-n">${pct}%</span>
  </div>
</div>`;
}
function foot(id, mod) {
  const isB = mod === 'b';
  const on = done.has(id);
  return `
<div class="lesson-foot">
  <button class="done-btn${on ? ' on' : ''}${isB ? ' amb' : ''}" onclick="markDone('${id}',this)">
    ${on ? '✓ Concluído' : 'Marcar como concluído'}
  </button>
  <div class="pn">
    <button class="btn btn-ghost btn-sm" onclick="prevNext(-1)">← Anterior</button>
    <button class="btn ${isB ? 'btn-amber' : 'btn-teal'} btn-sm" onclick="prevNext(1)">Próxima →</button>
  </div>
</div>`;
}
function renderLesson(l, mod) {
  document.getElementById('main').innerHTML =
    chrome(l, mod) +
    `<div class="content">${l.content}</div>` +
    foot(l.id, mod);
}

// ═══════════════════════════════════════════════════
// RENDER QUIZ
// ═══════════════════════════════════════════════════
function renderQuiz(l, mod) {
  const isB = mod === 'b';
  let html = chrome(l, mod) + `<div class="qz">
    <div class="qz-title">${l.title}</div>
    <div class="qz-sub">Responda todas as questões — a explicação aparece após cada resposta.</div>`;
  l.quiz.forEach((q, qi) => {
    html += `<div class="qb" id="qb${qi}">
      <div class="qb-num"><span>Questão ${qi + 1} de ${l.quiz.length}</span></div>
      <div class="qb-q">${q.q}</div>
      <div class="q-opts">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="q-opt" onclick="answerQ(this,${qi},${oi},${q.ans},'${l.id}','${q.exp.replace(/'/g, "\\'")}','${mod}')">
        <span class="opt-i">${String.fromCharCode(65 + oi)}</span>${opt}</button>`;
    });
    html += `</div><div class="q-exp" id="qexp${qi}">💡 ${q.exp}</div></div>`;
  });
  html += `<div class="qz-res" id="qzres">
    <div class="res-big" id="rsbig">0/${l.quiz.length}</div>
    <div class="res-lbl">respostas corretas</div>
    <div class="res-msg" id="rsmsg"></div>
    <div class="res-acts">
      <button class="btn btn-ghost" onclick="renderQuiz(window._cq.l,window._cq.m)">🔄 Refazer</button>
      <button class="btn ${isB ? 'btn-amber' : 'btn-teal'}" onclick="prevNext(1)">Próxima →</button>
    </div>
  </div></div>` + foot(l.id, mod);
  document.getElementById('main').innerHTML = html;
  window._cq = { l, m: mod, answers: {}, total: l.quiz.length };
}
function answerQ(btn, qi, oi, ans, lid, exp, mod) {
  const blk = document.getElementById('qb' + qi);
  if (blk.dataset.answered) return;
  blk.dataset.answered = '1';
  blk.querySelectorAll('.q-opt').forEach(b => b.disabled = true);
  blk.querySelectorAll('.q-opt')[ans].classList.add('ok');
  if (oi !== ans) btn.classList.add('no');
  document.getElementById('qexp' + qi).classList.add('vis');
  window._cq.answers[qi] = oi === ans;
  if (Object.keys(window._cq.answers).length === window._cq.total) {
    const ok = Object.values(window._cq.answers).filter(Boolean).length;
    const pct = Math.round(ok / window._cq.total * 100);
    document.getElementById('rsbig').textContent = ok + '/' + window._cq.total;
    document.getElementById('rsmsg').textContent = pct >= 80
      ? '🎯 Excelente! Você domina o conteúdo desta fase.'
      : pct >= 60 ? '✅ Bom resultado! Revise as questões que errou.'
      : '📚 Recomendo rever o conteúdo antes de avançar.';
    document.getElementById('qzres').classList.add('vis');
    if (pct >= 60) { done.add(lid); saveProgress(); renderNav(); }
  }
}

// ═══════════════════════════════════════════════════
// QUIZ GERAL
// ═══════════════════════════════════════════════════
function showQuizGeral() {
  let html = `<div class="lc">
    <div class="lc-crumb"><span>Avaliação Final</span></div>
    <div class="lc-row"><span class="lc-badge bd-gq">Quiz Geral — ${QUIZ_GERAL.length} questões</span></div>
    <div class="lc-title">Quiz Completo — Saúde Pública & WebApps</div>
  </div>
  <div class="qz">
    <div class="qz-title">Avaliação Integrada Final</div>
    <div class="qz-sub">${QUIZ_GERAL.length} questões cobrindo os dois módulos. Cada questão indica de qual módulo vem.</div>`;
  QUIZ_GERAL.forEach((q, qi) => {
    const isB = q.m === 'B';
    html += `<div class="qb" id="gqb${qi}">
      <div class="qb-num">
        <span>Questão ${qi + 1}/${QUIZ_GERAL.length}</span>
        <span style="color:${isB ? 'var(--b-amber)' : 'var(--b-teal)'}">Módulo ${q.m}</span>
      </div>
      <div class="qb-q">${q.q}</div>
      <div class="q-opts">`;
    q.opts.forEach((opt, oi) => {
      html += `<button class="q-opt" onclick="gAnswer(this,${qi},${oi},${q.ans},'${q.exp.replace(/'/g, "\\'")}')">
        <span class="opt-i">${String.fromCharCode(65 + oi)}</span>${opt}</button>`;
    });
    html += `</div><div class="q-exp" id="gqexp${qi}">💡 ${q.exp}</div></div>`;
  });
  html += `<div class="qz-res" id="gqzres">
    <div class="res-big" id="grsbig">0/${QUIZ_GERAL.length}</div>
    <div class="res-lbl">respostas corretas</div>
    <div class="res-msg" id="grsmsg"></div>
    <div class="res-acts">
      <button class="btn btn-ghost" onclick="showQuizGeral()">🔄 Refazer Quiz Geral</button>
    </div>
  </div></div>`;
  document.getElementById('main').innerHTML = html;
  window._gq = { answers: {}, total: QUIZ_GERAL.length };
}
function gAnswer(btn, qi, oi, ans, exp) {
  const blk = document.getElementById('gqb' + qi);
  if (blk.dataset.answered) return;
  blk.dataset.answered = '1';
  blk.querySelectorAll('.q-opt').forEach(b => b.disabled = true);
  blk.querySelectorAll('.q-opt')[ans].classList.add('ok');
  if (oi !== ans) btn.classList.add('no');
  document.getElementById('gqexp' + qi).classList.add('vis');
  window._gq.answers[qi] = oi === ans;
  if (Object.keys(window._gq.answers).length === window._gq.total) {
    const ok = Object.values(window._gq.answers).filter(Boolean).length;
    const pct = Math.round(ok / window._gq.total * 100);
    document.getElementById('grsbig').textContent = ok + '/' + window._gq.total;
    document.getElementById('grsmsg').textContent = pct >= 80
      ? '🎯 Excelente! Você domina os fundamentos das duas frentes. Pronto para ensinar.'
      : pct >= 60 ? '✅ Bom resultado! Revise os pontos que errou e refaça.'
      : '📚 Recomende rever os módulos antes de avançar. O conteúdo está no menu lateral.';
    document.getElementById('gqzres').classList.add('vis');
  }
}
