<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Curso Intensivo — WebApps & Saúde Pública</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--bg2:#eeeae0;--bg3:#e4dfd2;
  --ink:#1a1a18;--ink2:#4a4a44;--ink3:#8a8a80;
  --teal:#0d7a6e;--teal2:#e0f2ef;--teal3:#b2e4dc;
  --amber:#b85c00;--amber2:#fff3e0;--amber3:#ffd599;
  --red:#c0392b;--red2:#fdecea;
  --green:#1a6b3c;--green2:#e6f4ec;--green3:#a3d9ba;
  --line:rgba(26,26,24,0.1);--line2:rgba(26,26,24,0.06);
  --serif:'Fraunces',Georgia,serif;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r:6px;
  --shadow:0 2px 12px rgba(0,0,0,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.7;min-height:100vh;}

/* ── TOP PROGRESS ── */
#top-bar{position:fixed;top:0;left:0;right:0;height:3px;background:var(--bg3);z-index:200;}
#top-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--teal),var(--amber));transition:width .4s;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh;padding-top:3px;}

/* ── SIDEBAR ── */
.sidebar{
  background:var(--ink);
  position:sticky;top:3px;height:calc(100vh - 3px);overflow-y:auto;
  display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);}
.sb-header{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sb-logo{font-family:var(--serif);font-size:17px;color:#fff;font-weight:700;margin-bottom:4px;line-height:1.2;}
.sb-sub{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:0.1em;text-transform:uppercase;}

/* Overall Progress */
.sb-progress{padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.08);}
.sb-prog-label{font-family:var(--mono);font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;}
.sb-prog-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),#2ec4b6);border-radius:2px;transition:width .4s;}

/* Module Tabs */
.mod-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);}
.mod-tab{
  flex:1;padding:12px 8px;text-align:center;
  font-family:var(--mono);font-size:10px;letter-spacing:0.06em;
  color:rgba(255,255,255,0.4);border-bottom:2px solid transparent;
  transition:all .15s;
}
.mod-tab.active,.mod-tab:hover{color:#fff;}
.mod-tab.active{border-bottom-color:var(--teal);}
.mod-tab.mod-b.active{border-bottom-color:var(--amber);}

/* Nav tree */
.nav-tree{flex:1;padding:12px 0;}
.nav-module{margin-bottom:4px;}
.nav-module-header{
  padding:8px 24px;
  font-family:var(--mono);font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.3);
  display:flex;align-items:center;gap:8px;margin-top:8px;
}
.nav-etapa{padding:6px 24px 6px 32px;}
.nav-etapa-label{
  font-size:11px;color:rgba(255,255,255,0.5);
  margin-bottom:2px;font-family:var(--mono);font-size:10px;letter-spacing:0.06em;
}
.nav-aula{
  display:flex;align-items:center;gap:8px;
  padding:7px 24px 7px 32px;
  font-size:13px;color:rgba(255,255,255,0.6);
  transition:background .15s,color .15s;border-left:2px solid transparent;
}
.nav-aula:hover{background:rgba(255,255,255,0.04);color:#fff;}
.nav-aula.active{background:rgba(255,255,255,0.07);color:#fff;border-left-color:var(--teal);}
.nav-aula.mod-b.active{border-left-color:var(--amber);}
.nav-aula.done .nav-check{opacity:1;}
.nav-check{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;opacity:0.4;transition:all .2s;}
.nav-aula.done .nav-check{background:var(--teal);border-color:var(--teal);color:#fff;opacity:1;}
.nav-aula-title{flex:1;line-height:1.3;}
.nav-aula-type{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:0.06em;}

.sb-footer{padding:16px 24px;border-top:1px solid rgba(255,255,255,0.08);}
.sb-quiz-btn{
  width:100%;padding:10px;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);border-radius:var(--r);
  color:rgba(255,255,255,0.7);font-family:var(--mono);font-size:11px;
  letter-spacing:0.06em;text-align:center;transition:all .15s;
}
.sb-quiz-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}

/* ── MAIN CONTENT ── */
.main{padding:0;display:flex;flex-direction:column;min-height:calc(100vh - 3px);}

/* Lesson header */
.lesson-header{
  padding:40px 56px 32px;
  border-bottom:1px solid var(--line);
  background:var(--bg);
  position:sticky;top:3px;z-index:50;
}
.lh-breadcrumb{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:0.06em;margin-bottom:10px;display:flex;gap:6px;align-items:center;}
.lh-breadcrumb span{color:var(--ink3);}
.lh-breadcrumb .sep{opacity:0.4;}
.lh-meta{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.lh-type-badge{
  padding:3px 10px;border-radius:20px;
  font-family:var(--mono);font-size:10px;letter-spacing:0.06em;font-weight:500;
}
.badge-aula{background:var(--teal2);color:var(--teal);}
.badge-quiz{background:var(--amber2);color:var(--amber);}
.badge-exercicio{background:var(--green2);color:var(--green);}
.badge-quiz-geral{background:#1a1a18;color:#fff;}
.lh-title{font-family:var(--serif);font-size:clamp(22px,3vw,32px);font-weight:700;line-height:1.15;letter-spacing:-0.01em;}
.lh-title.mod-b{color:var(--amber);}

/* Progress bar lesson */
.lesson-progress{padding:0 56px;background:var(--bg2);border-bottom:1px solid var(--line);}
.lp-inner{display:flex;align-items:center;gap:16px;padding:12px 0;}
.lp-label{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.lp-bar{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.lp-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s;}
.lp-fill.mod-b{background:var(--amber);}
.lp-pct{font-family:var(--mono);font-size:11px;color:var(--ink3);min-width:32px;text-align:right;}

/* Lesson body */
.lesson-body{flex:1;padding:48px 56px;max-width:780px;}

/* Content components */
.concept-card{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:28px 32px;margin:24px 0;
  box-shadow:var(--shadow);
}
.concept-card .cc-label{
  font-family:var(--mono);font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--teal);margin-bottom:12px;
}
.concept-card.mod-b .cc-label{color:var(--amber);}
.concept-card h3{font-family:var(--serif);font-size:22px;font-weight:700;margin-bottom:12px;line-height:1.2;}
.concept-card p{font-size:14px;color:var(--ink2);line-height:1.75;margin-bottom:10px;}
.concept-card p:last-child{margin-bottom:0;}

.analogy-box{
  background:var(--teal2);border-left:3px solid var(--teal);
  border-radius:0 6px 6px 0;padding:16px 20px;margin:16px 0;
  font-size:14px;color:var(--ink2);line-height:1.6;
}
.analogy-box.mod-b{background:var(--amber2);border-left-color:var(--amber);}
.analogy-box .al-label{font-family:var(--mono);font-size:10px;color:var(--teal);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;font-weight:500;}
.analogy-box.mod-b .al-label{color:var(--amber);}

.code-block{
  background:#1a1a18;border-radius:8px;padding:20px 24px;margin:16px 0;
  font-family:var(--mono);font-size:13px;color:#c8e6c9;line-height:1.8;
  overflow-x:auto;
}
.code-comment{color:rgba(255,255,255,0.3);}
.code-key{color:#80cbc4;}
.code-val{color:#ffcc80;}
.code-str{color:#a5d6a7;}

.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.vocab-item{
  background:var(--bg2);border-radius:6px;padding:14px 16px;
  border-left:3px solid var(--teal);
}
.vocab-item.mod-b{border-left-color:var(--amber);}
.vocab-term{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px;}
.vocab-def{font-size:12px;color:var(--ink3);line-height:1.5;}

.diagram-box{
  border:1px solid var(--line);border-radius:8px;overflow:hidden;margin:20px 0;
}
.diagram-box svg{display:block;width:100%;height:auto;}

.callout{padding:16px 20px;border-radius:6px;margin:16px 0;font-size:14px;line-height:1.6;}
.callout-info{background:var(--teal2);color:var(--teal);}
.callout-warn{background:var(--amber2);color:var(--amber);}
.callout-tip{background:var(--green2);color:var(--green);}
.callout strong{font-weight:600;}
.callout-label{font-family:var(--mono);font-size:9px;letter-spacing:0.1em;text-transform:uppercase;font-weight:500;display:block;margin-bottom:4px;}

/* Lists */
.lesson-body ul,.lesson-body ol{padding-left:20px;margin:12px 0;}
.lesson-body li{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:4px;}
.lesson-body p{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:14px;}
.lesson-body h2{font-family:var(--serif);font-size:24px;font-weight:700;margin:32px 0 14px;color:var(--ink);}
.lesson-body h3{font-family:var(--serif);font-size:19px;font-weight:600;margin:24px 0 10px;color:var(--ink);}
.lesson-body strong{font-weight:600;color:var(--ink);}

/* Separador */
.section-sep{height:1px;background:var(--line);margin:32px 0;}

/* Exercício */
.exercise-box{
  background:#fff;border:2px solid var(--green3);border-radius:10px;
  padding:24px 28px;margin:24px 0;
}
.ex-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);margin-bottom:10px;font-weight:500;}
.ex-title{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:10px;}
.ex-desc{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:16px;}
.ex-steps{display:flex;flex-direction:column;gap:8px;}
.ex-step{display:flex;gap:12px;align-items:flex-start;}
.ex-step-n{
  min-width:22px;height:22px;border-radius:50%;
  background:var(--green);color:#fff;
  font-family:var(--mono);font-size:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ex-step-t{font-size:13px;color:var(--ink2);line-height:1.6;padding-top:2px;}
.ex-hint{
  margin-top:14px;padding:12px 16px;
  background:var(--green2);border-radius:4px;
  font-size:13px;color:var(--green);
}

/* ── QUIZ ── */
.quiz-container{padding:40px 56px;max-width:780px;}
.quiz-title{font-family:var(--serif);font-size:26px;font-weight:700;margin-bottom:6px;}
.quiz-sub{font-size:14px;color:var(--ink3);margin-bottom:32px;}
.q-block{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:24px 28px;margin-bottom:16px;
  box-shadow:var(--shadow);
}
.q-num{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:0.08em;margin-bottom:8px;}
.q-text{font-size:15px;font-weight:500;color:var(--ink);margin-bottom:16px;line-height:1.5;}
.q-options{display:flex;flex-direction:column;gap:8px;}
.q-opt{
  padding:12px 16px;border:1.5px solid var(--line);border-radius:6px;
  font-size:14px;color:var(--ink2);text-align:left;background:#fff;
  transition:all .15s;display:flex;align-items:center;gap:10px;
}
.q-opt:hover:not(:disabled){border-color:var(--teal);color:var(--ink);background:var(--teal2);}
.q-opt.correct{border-color:var(--green)!important;background:var(--green2)!important;color:var(--green)!important;}
.q-opt.wrong{border-color:var(--red)!important;background:var(--red2)!important;color:var(--red)!important;}
.q-opt .opt-indicator{
  width:18px;height:18px;border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;
}
.q-explanation{
  margin-top:12px;padding:12px 14px;background:var(--teal2);
  border-radius:4px;font-size:13px;color:var(--teal);line-height:1.6;display:none;
}
.q-explanation.show{display:block;}
.quiz-result{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:32px;text-align:center;margin-top:24px;display:none;
  box-shadow:var(--shadow);
}
.quiz-result.show{display:block;}
.qr-score{font-family:var(--serif);font-size:52px;font-weight:700;color:var(--teal);}
.qr-label{font-size:15px;color:var(--ink3);margin-bottom:20px;}
.qr-msg{font-size:16px;color:var(--ink2);margin-bottom:24px;line-height:1.6;}
.quiz-actions{display:flex;gap:12px;justify-content:center;margin-top:8px;}

/* ── BUTTONS ── */
.btn{
  padding:11px 24px;border-radius:var(--r);font-family:var(--mono);
  font-size:12px;letter-spacing:0.06em;text-transform:uppercase;
  font-weight:500;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal2);color:var(--teal);}
.btn-secondary{background:var(--bg2);color:var(--ink2);border:1px solid var(--line);}
.btn-secondary:hover{background:var(--bg3);color:var(--ink);}
.btn-amber{background:var(--amber);color:#fff;}
.btn-amber:hover{background:var(--amber2);color:var(--amber);}
.btn-sm{padding:7px 14px;font-size:11px;}

/* Navigation buttons */
.lesson-nav{
  padding:24px 56px 40px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--line);margin-top:auto;
}
.nav-prev-next{display:flex;gap:10px;}

/* Mark done */
.mark-done-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:var(--r);
  border:1.5px solid var(--teal);color:var(--teal);
  background:transparent;font-family:var(--mono);font-size:11px;
  letter-spacing:0.06em;text-transform:uppercase;transition:all .15s;
}
.mark-done-btn.done{background:var(--teal);color:#fff;}
.mark-done-btn:hover{background:var(--teal);color:#fff;}

/* ── WELCOME SCREEN ── */
.welcome{padding:60px 56px;max-width:740px;}
.welcome h1{font-family:var(--serif);font-size:clamp(32px,4vw,52px);font-weight:700;line-height:1.05;letter-spacing:-0.02em;margin-bottom:20px;}
.welcome h1 em{font-style:italic;color:var(--teal);}
.welcome-desc{font-size:16px;color:var(--ink2);line-height:1.75;margin-bottom:32px;max-width:580px;}
.welcome-modules{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:36px;}
.wm-card{
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:24px;box-shadow:var(--shadow);
}
.wm-card.mod-a{border-top:3px solid var(--teal);}
.wm-card.mod-b{border-top:3px solid var(--amber);}
.wm-num{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:0.1em;margin-bottom:8px;}
.wm-title{font-family:var(--serif);font-size:18px;font-weight:700;margin-bottom:8px;}
.wm-desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:12px;}
.wm-stats{display:flex;gap:12px;}
.wm-stat{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.wm-stat span{color:var(--ink);font-weight:500;}

/* Responsive */
@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;max-height:280px;}
  .lesson-header{padding:24px 20px 16px;position:static;}
  .lesson-progress{padding:0 20px;}
  .lesson-body,.quiz-container,.welcome{padding:24px 20px;}
  .lesson-nav{padding:16px 20px 24px;}
  .vocab-grid,.welcome-modules{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="top-bar"><div id="top-fill"></div></div>

<div class="app">
<!-- ══════════ SIDEBAR ══════════ -->
<aside class="sidebar">
  <div class="sb-header">
    <div class="sb-logo">Curso Intensivo<br>Pessoal</div>
    <div class="sb-sub">WebApps · Saúde Pública</div>
  </div>
  <div class="sb-progress">
    <div class="sb-prog-label"><span>Progresso geral</span><span id="prog-pct">0%</span></div>
    <div class="sb-prog-bar"><div class="sb-prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="mod-tabs">
    <div class="mod-tab active" onclick="switchMod('a',this)">Módulo A</div>
    <div class="mod-tab mod-b" onclick="switchMod('b',this)">Módulo B</div>
  </div>
  <nav class="nav-tree" id="nav-tree"></nav>
  <div class="sb-footer">
    <button class="sb-quiz-btn" onclick="goTo('quiz-geral')">🎯 Quiz Geral Final</button>
  </div>
</aside>

<!-- ══════════ MAIN ══════════ -->
<main class="main" id="main-area"></main>
</div>

<script>
// ══════════════════════════════════════
// CURRICULUM DATA
// ══════════════════════════════════════
const curriculum = {
  a: {
    label:'Módulo A',
    title:'Fundamentos de WebApps',
    color:'teal',
    etapas:[
      {
        id:'a1', label:'Etapa 1 — A Arquitetura',
        aulas:[
          {id:'a1.1',type:'aula',title:'O que é um WebApp (e por que não é um site)',
           content: `<div class="concept-card">
<div class="cc-label">Conceito Central</div>
<h3>WebApp vs Site: a diferença que muda tudo</h3>
<p>Um <strong>site</strong> é estático: você visita, lê, vai embora. Um <strong>WebApp</strong> <em>faz coisas</em>: salva dados, reage às suas ações, muda de estado.</p>
<div class="analogy-box"><div class="al-label">Analogia</div>
<strong>Site</strong> = vitrine de loja. <strong>WebApp</strong> = o caixa eletrônico. Um você olha; o outro você opera.</div>
<p>Tudo que você construiu — lista de presença ao vivo, sistema de certificados, biblioteca de documentos — são WebApps. Não sites.</p>
</div>
<h2>A distinção prática</h2>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">Site estático</div><div class="vocab-def">HTML fixo. Não muda sem alguém editar o código. Ex: página de apresentação.</div></div>
<div class="vocab-item"><div class="vocab-term">WebApp dinâmico</div><div class="vocab-def">Reage a dados, salva informações, muda conforme o usuário. Ex: seu sistema do Conselho.</div></div>
<div class="vocab-item"><div class="vocab-term">PWA</div><div class="vocab-def">Progressive Web App. WebApp que funciona como app nativo — instalável, ícone na tela, offline parcial.</div></div>
<div class="vocab-item"><div class="vocab-term">Deploy</div><div class="vocab-def">Publicar o sistema para que outros acessem. Você já faz isso via GitHub Pages.</div></div>
</div>
<div class="callout callout-info"><span class="callout-label">Por que isso importa para você</span>Quando você apresentar seu trabalho para gestores ou para o PEP, a distinção entre "site" e "sistema web" muda o peso do que você entregou. Nunca diga "fiz um site" — você fez um <strong>sistema</strong>.</div>`},

          {id:'a1.2',type:'aula',title:'Frontend, Backend, Banco: o trio fundamental',
           content:`<div class="concept-card">
<div class="cc-label">Arquitetura Central</div>
<h3>Os três atores de qualquer sistema</h3>
<p>Todo sistema digital — dos mais simples aos mais complexos — tem três camadas distintas. Você já trabalha com todas, só não tinha os nomes.</p>
</div>
<div class="diagram-box">
<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" style="font-family:'DM Mono',monospace;">
<rect x="20" y="40" width="180" height="120" rx="8" fill="#e0f2ef" stroke="#0d7a6e" stroke-width="1.5"/>
<text x="110" y="75" text-anchor="middle" fill="#0d7a6e" font-size="11" font-weight="500">FRONTEND</text>
<text x="110" y="92" text-anchor="middle" fill="#4a4a44" font-size="10">HTML / CSS / JS</text>
<text x="110" y="108" text-anchor="middle" fill="#4a4a44" font-size="10">O que o usuário vê</text>
<text x="110" y="124" text-anchor="middle" fill="#0d7a6e" font-size="10">≈ Seu PWA</text>
<path d="M200 100 L240 100" stroke="#8a8a80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<rect x="240" y="40" width="160" height="120" rx="8" fill="#fff3e0" stroke="#b85c00" stroke-width="1.5"/>
<text x="320" y="75" text-anchor="middle" fill="#b85c00" font-size="11" font-weight="500">BACKEND</text>
<text x="320" y="92" text-anchor="middle" fill="#4a4a44" font-size="10">Google Apps Script</text>
<text x="320" y="108" text-anchor="middle" fill="#4a4a44" font-size="10">A lógica e o processamento</text>
<text x="320" y="124" text-anchor="middle" fill="#b85c00" font-size="10">≈ Seu GAS</text>
<path d="M400 100 L440 100" stroke="#8a8a80" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<rect x="440" y="40" width="180" height="120" rx="8" fill="#e6f4ec" stroke="#1a6b3c" stroke-width="1.5"/>
<text x="530" y="75" text-anchor="middle" fill="#1a6b3c" font-size="11" font-weight="500">BANCO DE DADOS</text>
<text x="530" y="92" text-anchor="middle" fill="#4a4a44" font-size="10">Google Sheets</text>
<text x="530" y="108" text-anchor="middle" fill="#4a4a44" font-size="10">Onde os dados vivem</text>
<text x="530" y="124" text-anchor="middle" fill="#1a6b3c" font-size="10">≈ Sua planilha</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M2 2L8 5L2 8" fill="none" stroke="#8a8a80" stroke-width="1.5"/></marker></defs>
</svg>
</div>
<div class="analogy-box"><div class="al-label">Analogia — Restaurante</div>
<strong>Frontend</strong> = salão e cardápio (o cliente interage aqui).<br>
<strong>Backend</strong> = cozinha (onde o pedido é processado).<br>
<strong>Banco de dados</strong> = despensa/estoque (onde as informações ficam guardadas).</div>
<h2>Você já está fazendo isso</h2>
<div class="code-block">
<span class="code-comment">// Quando seu PWA chama o GAS:</span><br>
<span class="code-key">google.script.run</span>.<span class="code-val">withSuccessHandler</span>(callback)<br>
&nbsp;&nbsp;.<span class="code-val">salvarPresenca</span>(dadosDoFormulario);<br>
<br>
<span class="code-comment">// Frontend → Backend → Planilha</span><br>
<span class="code-comment">// Isso é a arquitetura completa funcionando</span>
</div>
<div class="callout callout-tip"><span class="callout-label">Conclusão</span>Você já implementa arquitetura de três camadas. Agora você tem o <strong>nome</strong> para explicar isso com autoridade.</div>`},

          {id:'a1.3',type:'aula',title:'O modelo Cliente-Servidor explicado de vez',
           content:`<div class="concept-card">
<div class="cc-label">Conceito Fundamental</div>
<h3>Cliente faz pedido → Servidor processa → Resposta volta</h3>
<p>Este é o modelo que rege toda a internet. Sem exceção. Entendê-lo conceitualmente resolve 80% das dúvidas sobre "por que o sistema fez isso".</p>
</div>
<h2>O fluxo básico</h2>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">Cliente (Client)</div><div class="vocab-def">Quem faz o pedido. No seu caso: o navegador do usuário rodando seu HTML/JS.</div></div>
<div class="vocab-item"><div class="vocab-term">Servidor (Server)</div><div class="vocab-def">Quem responde ao pedido. No seu caso: o Google Apps Script.</div></div>
<div class="vocab-item"><div class="vocab-term">Requisição (Request)</div><div class="vocab-def">O pedido que o cliente manda. "Quero salvar este dado" / "Me dê a lista de presença".</div></div>
<div class="vocab-item"><div class="vocab-term">Resposta (Response)</div><div class="vocab-def">O que o servidor devolve. Pode ser dados, confirmação ou erro.</div></div>
</div>
<div class="analogy-box"><div class="al-label">Analogia — Restaurante (parte 2)</div>
O <strong>garçom</strong> leva o pedido da mesa (cliente) para a cozinha (servidor).<br>
A cozinha prepara (processa) e devolve o prato (resposta).<br>
O garçom = a rede/internet.<br>
<em>A API é o protocolo que garçom e cozinha usam para se entender.</em>
</div>
<h2>Por que isso importa para depurar bugs</h2>
<p>Quando algo "não funciona", o problema está em um destes pontos:</p>
<ul>
<li>O cliente não mandou o pedido certo (bug no frontend)</li>
<li>O servidor recebeu mas processou errado (bug no GAS)</li>
<li>O banco não tinha o dado esperado (bug de estado)</li>
<li>A resposta voltou, mas o cliente não soube interpretá-la</li>
</ul>
<div class="callout callout-info"><span class="callout-label">Dica de debug</span>Quando tem erro, pergunte-se: <strong>"Em qual das quatro etapas o problema está?"</strong> Isso elimina 70% do tempo de investigação.</div>`},

          {id:'a1.q',type:'quiz',title:'Quiz da Etapa 1 — Arquitetura',
           quiz:[
             {q:'Qual é a diferença fundamental entre um site e um WebApp?',opts:['Sites usam HTML, WebApps usam JavaScript','Sites são estáticos, WebApps reagem a dados e fazem coisas','Sites rodam no servidor, WebApps no cliente','Não há diferença técnica relevante'],ans:1,exp:'A distinção central é que WebApps são dinâmicos — salvam dados, reagem a ações, mudam de estado. Sites são principalmente estáticos.'},
             {q:'No seu sistema do Conselho, o Google Apps Script representa qual camada?',opts:['Frontend','Banco de dados','Backend','Deploy'],ans:2,exp:'O GAS é o backend — é onde a lógica roda, o processamento acontece, antes de salvar na planilha (banco de dados).'},
             {q:'O que é uma "requisição" no modelo cliente-servidor?',opts:['A resposta que o servidor devolve','O banco de dados','O pedido que o cliente manda ao servidor','O frontend renderizado'],ans:0,exp:'Requisição (Request) é o pedido que parte do cliente (navegador) em direção ao servidor (GAS).'},
             {q:'Quando você usa google.script.run no seu código, você está:',opts:['Acessando o banco de dados diretamente','Fazendo o frontend chamar o backend','Fazendo deploy do sistema','Criando um novo arquivo no Drive'],ans:1,exp:'google.script.run é exatamente a chamada do frontend (seu HTML/JS) para o backend (GAS). É a arquitetura cliente-servidor em ação.'},
           ]},
        ]
      },
      {
        id:'a2', label:'Etapa 2 — Dados e Estado',
        aulas:[
          {id:'a2.1',type:'aula',title:'CRUD: o DNA de qualquer sistema',
           content:`<div class="concept-card">
<div class="cc-label">Conceito Essencial</div>
<h3>CRUD — as 4 operações de qualquer sistema de dados</h3>
<p>Praticamente todo sistema de informação do mundo é uma variação de quatro operações básicas. Se você entende CRUD, você entende 80% de qualquer sistema.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">C — Create (Criar)</div><div class="vocab-def">Adicionar novo dado. Ex: novo conselheiro se inscrevendo, presença sendo registrada.</div></div>
<div class="vocab-item"><div class="vocab-term">R — Read (Ler)</div><div class="vocab-def">Buscar e exibir dados existentes. Ex: mostrar a lista de presença, carregar documentos.</div></div>
<div class="vocab-item"><div class="vocab-term">U — Update (Atualizar)</div><div class="vocab-def">Modificar dado existente. Ex: corrigir nome de conselheiro, atualizar status de deliberação.</div></div>
<div class="vocab-item"><div class="vocab-term">D — Delete (Deletar)</div><div class="vocab-def">Remover dado. Ex: excluir inscrição, remover documento desatualizado.</div></div>
</div>
<h2>CRUD no seu sistema do Conselho</h2>
<div class="code-block">
<span class="code-comment">// CREATE — adicionar presença</span><br>
planilha.<span class="code-val">appendRow</span>([nome, cpf, timestamp]);<br><br>
<span class="code-comment">// READ — carregar lista</span><br>
<span class="code-key">const</span> dados = planilha.<span class="code-val">getDataRange</span>().<span class="code-val">getValues</span>();<br><br>
<span class="code-comment">// UPDATE — corrigir um dado</span><br>
planilha.<span class="code-val">getRange</span>(linha, col).<span class="code-val">setValue</span>(novoValor);<br><br>
<span class="code-comment">// DELETE — remover linha</span><br>
planilha.<span class="code-val">deleteRow</span>(numeroLinha);
</div>
<div class="callout callout-tip"><span class="callout-label">Insight Estratégico</span>Quando você recebe um pedido para construir um sistema, a primeira pergunta é: <strong>"Quais dados precisam de CRUD?"</strong> Isso define 90% do escopo.</div>`},

          {id:'a2.2',type:'aula',title:'Estado (State): por que o sistema "lembra" das coisas',
           content:`<div class="concept-card">
<div class="cc-label">Conceito Fundamental</div>
<h3>Estado é a "memória atual" do sistema</h3>
<p>Estado é o conjunto de informações que descrevem <em>como o sistema está agora</em>. É o que muda quando o usuário interage.</p>
</div>
<h2>Onde o estado pode viver</h2>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">Estado no banco (planilha)</div><div class="vocab-def">Persistente. Sobrevive ao fechar o navegador. Ex: quem está inscrito no Conselho.</div></div>
<div class="vocab-item"><div class="vocab-term">Estado no frontend (JS)</div><div class="vocab-def">Temporário. Some quando a página recarrega. Ex: quais campos estão preenchidos agora.</div></div>
<div class="vocab-item"><div class="vocab-term">Estado no backend (GAS)</div><div class="vocab-def">Vive enquanto o script roda. Ex: dados em processamento antes de salvar.</div></div>
<div class="vocab-item"><div class="vocab-term">Estado global</div><div class="vocab-def">Acessível em todo o sistema. Ex: quais reuniões estão abertas para inscrição.</div></div>
</div>
<div class="analogy-box"><div class="al-label">Analogia — Reunião do Conselho</div>
O "estado da reunião" inclui: quem já assinou presença, qual pauta está sendo discutida, quantas deliberações foram aprovadas. Cada ação de um conselheiro <em>muda o estado</em>. O sistema precisa saber o estado atual para funcionar corretamente.
</div>
<h2>Bugs de estado são os mais traiçoeiros</h2>
<p>Quando seu sistema "perde" dados ou "fica desatualizado", é quase sempre um bug de estado: o que está na tela não reflete o que está no banco, ou vice-versa.</p>
<div class="callout callout-warn"><span class="callout-label">Regra prática</span>Se algo "sumiu" misteriosamente, pergunte: <strong>"Onde esse dado deveria viver?"</strong> Na tela (temporário) ou na planilha (permanente)?</div>`},

          {id:'a2.3',type:'aula',title:'APIs: a linguagem universal dos sistemas',
           content:`<div class="concept-card">
<div class="cc-label">Conceito Estratégico</div>
<h3>API = Interface de Programação de Aplicação</h3>
<p>API é o conjunto de regras que define como dois sistemas se comunicam. É o "protocolo de conversa" entre o seu frontend e o backend — e entre o seu sistema e sistemas externos.</p>
</div>
<div class="analogy-box"><div class="al-label">A Analogia do Garçom (versão definitiva)</div>
A cozinha (servidor) e a mesa (cliente) não falam diretamente. O garçom carrega pedido e resposta.<br><br>
A API é o <strong>cardápio estruturado</strong> + o <strong>protocolo do garçom</strong>: o que pode ser pedido, em que formato, e o que será devolvido.<br><br>
Se você pedir "algo com frango" sem ver o cardápio, o garçom não sabe o que trazer. A API define o formato exato do pedido.
</div>
<h2>Tipos de API que você usa ou vai usar</h2>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">API do GAS</div><div class="vocab-def">google.script.run — seu frontend chama funções no backend via esta API interna.</div></div>
<div class="vocab-item"><div class="vocab-term">REST API</div><div class="vocab-def">O padrão mais comum da web. Usa HTTP (GET, POST, PUT, DELETE). Você já usa ao chamar UrlFetchApp.</div></div>
<div class="vocab-item"><div class="vocab-term">API pública</div><div class="vocab-def">Expostas por serviços externos. Ex: ViaCEP, IBGE, DATASUS, RNDS do Ministério da Saúde.</div></div>
<div class="vocab-item"><div class="vocab-term">Webhook</div><div class="vocab-def">API "ao contrário" — o servidor avisa o cliente quando algo acontece, sem precisar ser perguntado.</div></div>
</div>
<h2>Uma chamada de API na prática</h2>
<div class="code-block">
<span class="code-comment">// GAS chamando API externa (ViaCEP)</span><br>
<span class="code-key">const</span> url = <span class="code-str">"https://viacep.com.br/ws/39401002/json/"</span>;<br>
<span class="code-key">const</span> resposta = UrlFetchApp.<span class="code-val">fetch</span>(url);<br>
<span class="code-key">const</span> dados = JSON.<span class="code-val">parse</span>(resposta.<span class="code-val">getContentText</span>());<br>
<span class="code-comment">// dados.logradouro → "Av. Cula Mangabeira"</span>
</div>`},

          {id:'a2.ex',type:'exercicio',title:'Exercício — Mapear o CRUD do seu sistema',
           content:`<div class="exercise-box">
<div class="ex-label">Exercício Prático</div>
<div class="ex-title">Mapeie o CRUD do Conselho</div>
<div class="ex-desc">Escolha uma funcionalidade do seu PWA do Conselho (ex: lista de presença, biblioteca de documentos, sistema de certificados) e mapeie as 4 operações CRUD.</div>
<div class="ex-steps">
<div class="ex-step"><div class="ex-step-n">1</div><div class="ex-step-t">Escreva qual dado é o centro da funcionalidade (ex: "registro de presença")</div></div>
<div class="ex-step"><div class="ex-step-n">2</div><div class="ex-step-t">Para cada letra do CRUD, descreva em 1 frase o que acontece: <em>Create: "Quando o conselheiro clica em Confirmar Presença..."</em></div></div>
<div class="ex-step"><div class="ex-step-n">3</div><div class="ex-step-t">Identifique se o D (Delete) existe no seu sistema — se não existe, pense: deveria existir?</div></div>
<div class="ex-step"><div class="ex-step-n">4</div><div class="ex-step-t">Identifique onde o estado vive: na planilha, na tela ou nos dois?</div></div>
</div>
<div class="ex-hint">💡 Isso vai virar seu vocabulário padrão ao descrever qualquer sistema para um cliente ou gestor.</div>
</div>`},

          {id:'a2.q',type:'quiz',title:'Quiz da Etapa 2 — Dados e Estado',
           quiz:[
             {q:'O que significa o "R" em CRUD?',opts:['Remove (remover)','Read (ler/buscar)','Register (registrar)','Run (executar)'],ans:1,exp:'Read significa ler ou buscar dados existentes. Ex: carregar a lista de presença para exibir na tela.'},
             {q:'Quando você usa planilha.appendRow() no GAS, que operação CRUD está fazendo?',opts:['Read','Update','Create','Delete'],ans:2,exp:'appendRow() adiciona uma nova linha — está criando (Create) um novo registro na planilha/banco.'},
             {q:'Qual a diferença entre estado na tela (frontend) e estado no banco (planilha)?',opts:['Não há diferença prática','Estado na tela é temporário; na planilha é permanente','Estado na planilha é mais rápido','Estado na tela é mais seguro'],ans:1,exp:'Estado no frontend (JS) desaparece quando a página fecha. Estado no banco (planilha) persiste — é permanente entre sessões.'},
             {q:'O que é um webhook?',opts:['Uma API que o cliente consulta periodicamente','Uma API onde o servidor avisa o cliente quando algo acontece','Um tipo de banco de dados','Um método de deploy'],ans:1,exp:'Webhook é uma API "ao contrário" — em vez de você perguntar "tem algo novo?", o servidor te avisa automaticamente quando algo acontece.'},
           ]},
        ]
      },
      {
        id:'a3', label:'Etapa 3 — Padrões e Vocabulário',
        aulas:[
          {id:'a3.1',type:'aula',title:'Padrões de sistema: reconhecer antes de construir',
           content:`<div class="concept-card">
<div class="cc-label">Modelos Mentais</div>
<h3>Todo sistema é uma variação de padrões conhecidos</h3>
<p>Assim como em arquitetura existe a planta de um quarto ou de uma cozinha, em software existem padrões recorrentes. Reconhecê-los antes de construir economiza semanas.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">CRUD App</div><div class="vocab-def">Cadastro, listagem, edição, exclusão. Ex: cadastro de conselheiros, biblioteca de documentos. Base de 95% dos sistemas.</div></div>
<div class="vocab-item"><div class="vocab-term">Dashboard</div><div class="vocab-def">Visualização de dados em tempo real. Filtros, gráficos, status. Ex: painel de presença ao vivo.</div></div>
<div class="vocab-item"><div class="vocab-term">Workflow System</div><div class="vocab-def">Processo com etapas e estados. Ex: inscrição → validação → credenciamento → certificado.</div></div>
<div class="vocab-item"><div class="vocab-term">Sistema de Notificação</div><div class="vocab-def">Dispara mensagens quando algo acontece. Ex: envio automático de certificados por email.</div></div>
<div class="vocab-item"><div class="vocab-term">Sistema de Auditoria/Log</div><div class="vocab-def">Registra tudo que aconteceu e quem fez. Crítico para gestão pública e LGPD.</div></div>
<div class="vocab-item"><div class="vocab-term">CMS</div><div class="vocab-def">Gerencia conteúdo (textos, documentos, páginas). Ex: biblioteca de atas, avisos do Conselho.</div></div>
</div>
<h2>Seu sistema do Conselho em padrões</h2>
<p>O PWA que você construiu combina múltiplos padrões:</p>
<ul>
<li><strong>CRUD App</strong> — biblioteca de documentos, cadastro de conselheiros</li>
<li><strong>Dashboard</strong> — lista de presença ao vivo</li>
<li><strong>Workflow System</strong> — reunião → presença → certificado</li>
<li><strong>Sistema de Notificação</strong> — envio automático de certificados</li>
<li><strong>CMS</strong> — página de avisos e comunicados</li>
</ul>
<div class="callout callout-tip"><span class="callout-label">Como usar isso</span>Antes de construir qualquer sistema novo, pergunte: <strong>"Qual padrão isso é?"</strong> A resposta já sugere a estrutura de dados e os fluxos necessários.</div>`},

          {id:'a3.2',type:'aula',title:'Vocabulário técnico essencial — glossário ativo',
           content:`<div class="concept-card">
<div class="cc-label">Glossário de Campo</div>
<h3>Os termos que você precisa dominar para a conversa técnica</h3>
<p>Não para impressionar — para ser preciso. Vocabulário correto reduz mal-entendidos e aumenta a credibilidade em reuniões técnicas.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item"><div class="vocab-term">Stack</div><div class="vocab-def">Conjunto de tecnologias que um sistema usa. Sua stack: HTML·JS·GAS·Sheets·GitHub Pages.</div></div>
<div class="vocab-item"><div class="vocab-term">Deploy / Build</div><div class="vocab-def">Deploy = publicar o sistema. Build = compilar/preparar para publicar. Você já faz deploy via GitHub.</div></div>
<div class="vocab-item"><div class="vocab-term">Endpoint</div><div class="vocab-def">Uma URL específica de uma API. Ex: viacep.com.br/ws/39401002/json/ é um endpoint.</div></div>
<div class="vocab-item"><div class="vocab-term">JSON</div><div class="vocab-def">JavaScript Object Notation. Formato padrão de troca de dados entre sistemas. Ex: {"nome":"João","cpf":"123"}.</div></div>
<div class="vocab-item"><div class="vocab-term">Async/Await</div><div class="vocab-def">Código que espera uma resposta antes de continuar. Necessário para chamadas de API que demoram.</div></div>
<div class="vocab-item"><div class="vocab-term">Callback</div><div class="vocab-def">Função que é chamada quando algo termina. Ex: withSuccessHandler(callback) no GAS.</div></div>
<div class="vocab-item"><div class="vocab-term">Variável de ambiente</div><div class="vocab-def">Configuração secreta (senha, chave de API) que não vai no código. No GAS: PropertiesService.</div></div>
<div class="vocab-item"><div class="vocab-term">Versionamento</div><div class="vocab-def">Controle de histórico do código. Você já usa com o Git/GitHub. Cada commit é uma versão.</div></div>
<div class="vocab-item"><div class="vocab-term">Refatoração</div><div class="vocab-def">Melhorar o código sem mudar o que ele faz. Organizar, renomear, simplificar.</div></div>
<div class="vocab-item"><div class="vocab-term">Escalabilidade</div><div class="vocab-def">Capacidade de crescer sem quebrar. Sheets/GAS tem limite — para escala real, precisa Firebase/SQL.</div></div>
</div>`},

          {id:'a3.3',type:'aula',title:'Seu nível atual e para onde ir: a trilha consciente',
           content:`<div class="concept-card">
<div class="cc-label">Autodiagnóstico</div>
<h3>Onde você está na trilha de desenvolvimento</h3>
<p>O guia que você recebeu do ChatGPT mapeou 5 níveis. Aqui está a leitura honesta da sua posição atual — e o que está em jogo em cada próximo passo.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item" style="border-left-color:#8a8a80"><div class="vocab-term">Nível 1 — Montador ✓</div><div class="vocab-def">Você domina: junta peças (GAS+Sheets), faz CRUD básico, entrega valor real. Já passou.</div></div>
<div class="vocab-item" style="border-left-color:var(--teal)"><div class="vocab-term">Nível 2 — Estruturador ← Você está aqui</div><div class="vocab-def">Entende fluxo, estado e arquitetura básica. Está organizar o pensamento antes de construir. Este curso te ajuda nisso.</div></div>
<div class="vocab-item" style="border-left-color:var(--amber)"><div class="vocab-term">Nível 3 — Arquiteto de sistemas leves</div><div class="vocab-def">Próximo passo: escolhe padrões conscientemente, modela dados antes de codificar, cria sistemas reutilizáveis, integra APIs externas.</div></div>
<div class="vocab-item" style="border-left-color:var(--ink3)"><div class="vocab-term">Nível 4+ — Engenheiro</div><div class="vocab-def">Escala, segurança, múltiplos usuários. Não é o foco agora — mas o caminho está claro.</div></div>
</div>
<h2>O que o Nível 3 exige concretamente</h2>
<ul>
<li>Antes de construir: esboçar no papel a estrutura de dados</li>
<li>Conhecer pelo menos 3 padrões de sistema e quando usar cada um</li>
<li>Integrar pelo menos uma API externa real (ex: ViaCEP, IBGE)</li>
<li>Ter um sistema com log de auditoria (quem fez o quê, quando)</li>
<li>Documentar o que construiu antes de esquecer como funciona</li>
</ul>
<div class="callout callout-info"><span class="callout-label">Para o seu contexto no serviço público</span>Chegar ao Nível 3 já te coloca muito à frente de 99% dos servidores. Nível 4 e 5 são para quando o escopo for maior — e aí você contrata parceiros ou aprende o que for necessário.</div>`},

          {id:'a3.q',type:'quiz',title:'Quiz da Etapa 3 — Padrões e Vocabulário',
           quiz:[
             {q:'Qual padrão de sistema é descrito por: "processo com etapas e estados (pendente, aprovado, concluído)"?',opts:['CRUD App','Dashboard','Workflow System','CMS'],ans:2,exp:'Workflow System é exatamente um processo com etapas definidas e estados. Ex: inscrição → validação → credenciamento → certificado.'},
             {q:'O que é um "endpoint"?',opts:['O último usuário do sistema','Uma URL específica de uma API','O banco de dados principal','O arquivo de configuração do deploy'],ans:1,exp:'Endpoint é uma URL específica que uma API expõe. Ao fazer fetch("https://viacep.com.br/ws/CEP/json/") você está acessando um endpoint.'},
             {q:'O que significa "refatoração"?',opts:['Criar um sistema do zero','Melhorar o código sem mudar o que ele faz','Migrar de tecnologia','Fazer deploy de uma nova versão'],ans:1,exp:'Refatoração é reorganizar, limpar e melhorar o código mantendo o comportamento idêntico. É manutenção de qualidade, não nova funcionalidade.'},

  b: {
    label:'Módulo B',
    title:'Saúde Pública & Gestão de Dados',
    color:'amber',
    etapas:[
      {
        id:'b1', label:'Etapa 1 — O Sistema de Saúde Brasileiro',
        aulas:[
          {id:'b1.1',type:'aula',title:'O SUS por dentro: estrutura, lógica e quem faz o quê',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Fundamento Essencial</div>
<h3>O SUS é uma arquitetura de três camadas</h3>
<p>O Sistema Único de Saúde é organizado em três esferas de governo, cada uma com papéis distintos. Entender isso é entender 80% da dinâmica política e operacional da SMS.</p>
</div>
<div class="diagram-box">
<svg viewBox="0 0 640 220" xmlns="http://www.w3.org/2000/svg" style="font-family:'DM Mono',monospace;">
<rect x="20" y="20" width="600" height="52" rx="6" fill="#fff3e0" stroke="#b85c00" stroke-width="1.5"/>
<text x="320" y="41" text-anchor="middle" fill="#b85c00" font-size="11" font-weight="500">FEDERAL — Ministério da Saúde</text>
<text x="320" y="57" text-anchor="middle" fill="#4a4a44" font-size="10">Define política nacional · financia via transferências · opera DATASUS · RNDS · e-SUS · normas técnicas</text>
<rect x="20" y="90" width="600" height="52" rx="6" fill="#e6f4ec" stroke="#1a6b3c" stroke-width="1.5"/>
<text x="320" y="111" text-anchor="middle" fill="#1a6b3c" font-size="11" font-weight="500">ESTADUAL — Secretaria Estadual de Saúde (SES-MG)</text>
<text x="320" y="127" text-anchor="middle" fill="#4a4a44" font-size="10">Coordena regionalmente · regulação · hospitais de referência · apoio técnico aos municípios</text>
<rect x="20" y="160" width="600" height="52" rx="6" fill="#e0f2ef" stroke="#0d7a6e" stroke-width="1.5"/>
<text x="320" y="181" text-anchor="middle" fill="#0d7a6e" font-size="11" font-weight="500">MUNICIPAL — Secretaria Municipal de Saúde (SMS) ← Você está aqui</text>
<text x="320" y="197" text-anchor="middle" fill="#4a4a44" font-size="10">Executa na ponta · UBS · ACS · Vigilâncias · Conselhos · é onde o dado nasce e onde a IA age</text>
</svg>
</div>
<h2>O município é o ponto crítico do SUS</h2>
<p>É no município onde a saúde realmente acontece — e onde os dados são gerados. O Ministério define políticas; o estado coordena; mas <strong>é a SMS que atende o cidadão, registra o dado, e precisa de sistemas inteligentes para funcionar</strong>.</p>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">Gestão plena municipal</div><div class="vocab-def">Quando o município assume responsabilidade total pelas ações de saúde. Montes Claros é referência regional — isso amplia o escopo e a complexidade.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Habilitação</div><div class="vocab-def">Certificação que autoriza o município a receber recursos federais para determinadas ações. Exige cumprimento de metas e indicadores.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Pactuação</div><div class="vocab-def">Acordo entre esferas sobre metas de saúde a serem atingidas. O município "pactua" indicadores com o estado e o federal.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Transferência fundo a fundo</div><div class="vocab-def">Como o dinheiro federal chega ao município — direto do Fundo Nacional de Saúde para o Fundo Municipal de Saúde, sem passar pelo Tesouro.</div></div>
</div>`},

          {id:'b1.2',type:'aula',title:'APS e a Atenção Primária: onde tudo começa',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Atenção Primária à Saúde</div>
<h3>A APS é a porta de entrada e o coração do SUS</h3>
<p>A Atenção Primária à Saúde é onde a maioria dos servidores que você vai encontrar trabalha — e onde a maioria dos dados de saúde nasce. Entender a APS é falar a língua deles.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">UBS — Unidade Básica de Saúde</div><div class="vocab-def">A "agência" local do SUS. Pré-natal, vacinação, hipertensos, diabéticos, saúde mental básica. É onde o cidadão é cadastrado.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">ESF — Estratégia Saúde da Família</div><div class="vocab-def">Modelo de organização da APS em equipes multiprofissionais. Uma equipe ESF atende ~3.000 pessoas de um território definido.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">ACS — Agente Comunitário de Saúde</div><div class="vocab-def">O elo entre a UBS e as famílias. Faz visitas domiciliares, registra dados, acompanha condições crônicas. É o maior volume de dado do SUS.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">NASF / eMulti</div><div class="vocab-def">Equipe de apoio às equipes de SF: psicólogo, fisioterapeuta, nutricionista, assistente social. Suporte especializado na APS.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Cobertura da APS</div><div class="vocab-def">% da população com acesso a equipe de Saúde da Família. Meta nacional: 100%. Montes Claros: ~90%. Dado estratégico.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">PMAQ / PREVINE BRASIL</div><div class="vocab-def">Programas federais que vinculam recursos à qualidade dos dados e das ações. Indicadores ruins = menos verba.</div></div>
</div>
<div class="analogy-box mod-b"><div class="al-label">Analogia — APS como Arquitetura de Software</div>
A UBS é o <strong>frontend</strong> — onde o usuário (cidadão) interage.<br>
O sistema de informação (e-SUS) é o <strong>backend</strong> — onde os dados são processados.<br>
O ACS é o <strong>agente de coleta</strong> — a API que traz dados do campo para o sistema.<br>
O Conselho de Saúde é a <strong>camada de auditoria</strong> — controle e validação.
</div>
<div class="callout callout-info"><span class="callout-label">Por que isso importa para você</span>Quando você propõe uma solução de automação, a pergunta que os profissionais fazem internamente é: <strong>"Isso atrapalha meu fluxo de trabalho com a UBS ou facilita?"</strong> Conhecer o fluxo é a diferença entre ser aceito ou rejeitado.</div>`},

          {id:'b1.3',type:'aula',title:'Os sistemas de informação em saúde: o ecossistema de dados',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Ecossistema de Dados</div>
<h3>O labirinto dos sistemas de saúde e como navegá-lo</h3>
<p>A saúde pública brasileira tem dezenas de sistemas de informação. A fragmentação desses sistemas é o principal problema que você pode ajudar a resolver — mas para isso precisa conhecê-los.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">e-SUS PEC/AB</div><div class="vocab-def">Sistema principal da APS. Prontuário eletrônico, fichas de atendimento individual, cadastro de território. Gerado nas UBSs.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">SINAN</div><div class="vocab-def">Sistema de Notificação de Agravos. Dengue, sífilis, tuberculose, violência. Alimentado pela Vigilância Epidemiológica.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">SIM</div><div class="vocab-def">Sistema de Informação sobre Mortalidade. Registra óbitos e causas. Fundamental para análise de mortalidade evitável.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">SINASC</div><div class="vocab-def">Sistema de Informação sobre Nascidos Vivos. Declarações de nascimento, dados do recém-nascido e da mãe.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">CNES</div><div class="vocab-def">Cadastro Nacional de Estabelecimentos de Saúde. Toda UBS, hospital, clínica registrada. Tem API pública.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Horus</div><div class="vocab-def">Sistema de gestão da assistência farmacêutica. Dispensação de medicamentos, estoque de farmácia básica.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">RNDS</div><div class="vocab-def">Rede Nacional de Dados em Saúde. Infraestrutura de APIs do Ministério para integrar todos os sistemas. Padrão FHIR.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">DATASUS / TabNet</div><div class="vocab-def">Portal de dados abertos do Ministério. Dados históricos de todos os sistemas. Acesso público via tabelas e APIs.</div></div>
</div>
<div class="callout callout-warn"><span class="callout-label">O grande problema que você pode resolver</span>Esses sistemas não conversam entre si. Um médico precisa de 5 logins diferentes para ver o histórico completo de um paciente. Isso é <strong>fragmentação de dados</strong> — e é exatamente o que APIs e integração de sistemas resolvem. Você sabe fazer isso.</div>`},

          {id:'b1.q',type:'quiz',title:'Quiz da Etapa 1 — O Sistema de Saúde',
           quiz:[
             {q:'Em qual esfera de governo o cidadão realmente é atendido e o dado de saúde nasce?',opts:['Federal — Ministério da Saúde','Estadual — SES-MG','Municipal — SMS','Federal e estadual em conjunto'],ans:2,exp:'É no município — nas UBSs, equipes ESF, ACS — onde o atendimento acontece e onde o dado é gerado. A SMS é o nível operacional do SUS.'},
             {q:'O que é o ACS (Agente Comunitário de Saúde)?',opts:['O diretor da UBS','O profissional que faz visitas domiciliares e é o elo entre a UBS e as famílias','O responsável pela vigilância epidemiológica','O coordenador do NASF'],ans:1,exp:'O ACS é o elo entre a UBS e as famílias — faz visitas domiciliares, registra dados no e-SUS, acompanha condições crônicas. É quem gera grande parte dos dados da APS.'},
             {q:'O SINAN é utilizado para registrar:',opts:['Óbitos e causas de morte','Medicamentos dispensados nas farmácias','Notificações de doenças e agravos (dengue, tuberculose etc.)','Nascidos vivos e dados da mãe'],ans:2,exp:'SINAN = Sistema de Informação sobre Notificação de Agravos. É onde se registra casos de doenças de notificação compulsória como dengue, sífilis, tuberculose.'},
             {q:'A RNDS (Rede Nacional de Dados em Saúde) tem como objetivo principal:',opts:['Substituir o e-SUS nas UBSs','Criar uma infraestrutura de APIs para integrar todos os sistemas de saúde','Controlar o orçamento federal da saúde','Registrar os estabelecimentos de saúde do país'],ans:1,exp:'A RNDS é a infraestrutura de APIs do Ministério da Saúde para conectar todos os sistemas usando o padrão FHIR — exatamente o tipo de integração que você pode implementar.'},
           ]},
        ]
      },
      {
        id:'b2', label:'Etapa 2 — Gestão, Dados e Controle Social',
        aulas:[
          {id:'b2.1',type:'aula',title:'Indicadores de saúde: como o desempenho é medido',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Gestão por Indicadores</div>
<h3>Indicadores são a linguagem dos gestores de saúde</h3>
<p>Todo gestor da SMS pensa em indicadores — metas, coberturas, taxas. Dominar esse vocabulário é falar na língua deles e mostrar que seus dashboards entregam o que precisam.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">Cobertura vacinal</div><div class="vocab-def">% da população alvo vacinada. Meta nacional: 95%. Queda abaixo de 70% é alerta de surto. Dado crítico para IA de vigilância.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Taxa de incidência</div><div class="vocab-def">Novos casos de doença por 100.000 habitantes em um período. Base da vigilância epidemiológica.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Taxa de mortalidade</div><div class="vocab-def">Óbitos por 100.000 hab. Mortalidade infantil e materna são os mais cobrados politicamente.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">RDQA</div><div class="vocab-def">Razão de Digitação e Qualidade de Ações. Mede a qualidade do preenchimento do e-SUS. Dado ruim = punição financeira.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Produção das equipes</div><div class="vocab-def">Quantas consultas, visitas, procedimentos cada equipe realizou. Base para avaliação e planejamento.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">SISPACTO</div><div class="vocab-def">Sistema de monitoramento das metas pactuadas entre município, estado e Ministério. O "boletim escolar" da SMS.</div></div>
</div>
<div class="analogy-box mod-b"><div class="al-label">Por que isso importa para os seus sistemas</div>
Quando você constrói um dashboard, o gestor não quer ver "dados brutos" — quer ver <strong>indicadores</strong>. A diferença entre "lista de vacinados" e "cobertura vacinal por bairro em tempo real" é o que separa um CRUD de um sistema de inteligência.
</div>
<h2>Os indicadores mais cobrados atualmente</h2>
<ul>
<li><strong>Cobertura de pré-natal</strong> — quantas gestantes tiveram 6+ consultas</li>
<li><strong>Cobertura vacinal</strong> — especialmente penta, sarampo, HPV</li>
<li><strong>Controle de hipertensão e diabetes</strong> — indicadores do Previne Brasil</li>
<li><strong>Notificações de dengue</strong> — dado crítico em Montes Claros (cidade endêmica)</li>
<li><strong>Proporção de abortos</strong> — indicador de qualidade do pré-natal</li>
</ul>`},

          {id:'b2.2',type:'aula',title:'Controle social e o papel do Conselho de Saúde',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Controle Social</div>
<h3>O Conselho de Saúde é uma instituição constitucional — e você a lidera operacionalmente</h3>
<p>O Conselho Municipal de Saúde não é um grupo de estudo — é um órgão de controle social com poder deliberativo garantido na Constituição Federal. Isso muda o peso político do que você faz.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">Lei 8.142/90</div><div class="vocab-def">A lei que criou os Conselhos de Saúde. Define composição paritária: 50% usuários, 25% trabalhadores, 25% gestores/prestadores.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Poder deliberativo</div><div class="vocab-def">O Conselho não apenas opina — delibera. Suas resoluções têm força normativa sobre a SMS. Isso é diferente de conselho consultivo.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Plenária</div><div class="vocab-def">A reunião plena do Conselho onde as deliberações são tomadas. É o ato oficial do controle social.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Mesa Diretora</div><div class="vocab-def">A presidência e vice-presidências do Conselho — eleitas pelos conselheiros. Quem coordena o órgão.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Conferência de Saúde</div><div class="vocab-def">Evento a cada 4 anos para avaliar a saúde e propor diretrizes. Começa no município, sobe ao estado e ao nacional.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">PAS — Plano de Ação em Saúde</div><div class="vocab-def">Planejamento anual da SMS aprovado pelo Conselho. Sem aprovação do Conselho, o Fundo de Saúde não libera recursos.</div></div>
</div>
<div class="callout callout-tip"><span class="callout-label">Insight estratégico</span>O Conselho precisa aprovar o Plano de Ação em Saúde para que o município acesse recursos federais. Isso significa que gestores da SMS <strong>dependem</strong> do Conselho funcionar bem. Isso é sua alavanca estratégica: um Conselho digital funciona melhor, e isso beneficia a SMS diretamente.</div>`},

          {id:'b2.3',type:'aula',title:'Fluxos e gargalos: onde a IA pode entrar de verdade',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Diagnóstico Operacional</div>
<h3>Os fluxos reais da SMS — onde as coisas travam</h3>
<p>Para propor soluções de IA relevantes, você precisa conhecer os fluxos operacionais da saúde pública. Aqui estão os principais — com os gargalos onde a IA pode agir.</p>
</div>
<h2>Fluxo 1 — Notificação epidemiológica</h2>
<p><strong>Como deveria ser:</strong> Caso suspeito → Notificação no SINAN → Análise → Ação de controle.<br>
<strong>Como é na prática:</strong> Papel → digitação tardia → consolidação manual → análise com dados velhos → ação tarde demais.<br>
<strong>Onde a IA entra:</strong> Webhook que dispara alerta quando caso é notificado. Dashboard de casos em tempo real. Previsão de surto por série histórica.</p>
<div class="section-sep"></div>
<h2>Fluxo 2 — Produção das equipes de APS</h2>
<p><strong>Como deveria ser:</strong> Atendimento → e-SUS → relatório de produção → avaliação → planejamento.<br>
<strong>Como é na prática:</strong> e-SUS preenchido parcialmente → relatório extraído manualmente → consolidado em planilha local → análise parcial → planejamento intuitivo.<br>
<strong>Onde a IA entra:</strong> Consolidação automática de produção. Dashboard por UBS/equipe. Alerta para equipes abaixo da meta.</p>
<div class="section-sep"></div>
<h2>Fluxo 3 — Regulação e referência</h2>
<p><strong>Como deveria ser:</strong> Médico solicita especialidade → sistema de regulação → fila → agendamento.<br>
<strong>Como é na prática:</strong> Formulário em papel → digitação na regulação → fila opaca → paciente sem retorno.<br>
<strong>Onde a IA entra:</strong> Status de solicitação por CPF. Alerta de fila crítica. Painel de tempo médio de espera por especialidade.</p>
<div class="section-sep"></div>
<div class="callout callout-info"><span class="callout-label">A pergunta-chave para qualquer gargalo</span>Antes de propor solução, pergunte: <strong>"Onde o dado nasce, onde ele trava, e onde o gestor precisa que chegue?"</strong> A IA resolve o "trava" e o transporte do dado.</div>`},

          {id:'b2.4',type:'aula',title:'LGPD e dados de saúde: o que você precisa saber como jurista',
           content:`<div class="concept-card mod-b">
<div class="cc-label">Segurança Jurídica</div>
<h3>Dados de saúde são categoria especial pela LGPD</h3>
<p>Como bacharel em Direito, você tem vantagem única aqui: você pode ler a LGPD e entender as implicações que técnicos de TI normalmente ignoram. Isso é um diferencial competitivo enorme.</p>
</div>
<div class="vocab-grid">
<div class="vocab-item mod-b"><div class="vocab-term">Dado pessoal sensível</div><div class="vocab-def">Categoria especial da LGPD. Dados de saúde, raça, religião, biometria, genética. Proteção reforçada — exige consentimento explícito ou base legal específica.</div></div>
<div class="vocab-item mod-b"><div class="vocab-term">Base legal para tratamento</div><div class="vocab-def">Justificativa legal para usar o dado. Na saúde pública: "tutela da saúde" e "interesse público" são as bases mais comuns — dispensa consentimento.</div></div>

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let currentMod='a';
let currentLesson=null;
let done=new Set(JSON.parse(localStorage.getItem('done')||'[]'));

function allLessons(mod){
  const m=curriculum[mod];
  return m.etapas.flatMap(e=>e.aulas);
}

function totalLessons(){
  return allLessons('a').length+allLessons('b').length;
}

function updateProgress(){
  const pct=Math.round((done.size/totalLessons())*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('top-fill').style.width=pct+'%';
  localStorage.setItem('done',JSON.stringify([...done]));
}

// ══════════════════════════════════════
// SIDEBAR RENDER
// ══════════════════════════════════════
function renderNav(){
  const tree=document.getElementById('nav-tree');
  tree.innerHTML='';
  const m=curriculum[currentMod];
  const isB=currentMod==='b';
  m.etapas.forEach(etapa=>{
    const div=document.createElement('div');
    div.className='nav-module';
    div.innerHTML=`<div class="nav-module-header">${etapa.label}</div>`;
    etapa.aulas.forEach(aula=>{
      const a=document.createElement('div');
      const isDone=done.has(aula.id);
      const isActive=currentLesson===aula.id;
      a.className=`nav-aula${isB?' mod-b':''}${isActive?' active':''}${isDone?' done':''}`;
      const typeLabel=aula.type==='quiz'?'quiz':aula.type==='exercicio'?'exercício':'aula';
      a.innerHTML=`<div class="nav-check">${isDone?'✓':''}</div><div class="nav-aula-title">${aula.title}</div><div class="nav-aula-type">${typeLabel}</div>`;
      a.onclick=()=>goTo(aula.id);
      div.appendChild(a);
    });
    tree.appendChild(div);
  });
}

function switchMod(mod,tab){
  currentMod=mod;
  document.querySelectorAll('.mod-tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderNav();
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function getFlatAll(){
  return [...allLessons('a'),...allLessons('b'),{id:'quiz-geral',type:'quiz-geral',title:'Quiz Geral Final'}];
}

function goTo(id){
  if(id==='quiz-geral'){showQuizGeral();currentLesson='quiz-geral';return;}
  const all=getFlatAll();
  const lesson=all.find(l=>l.id===id);
  if(!lesson)return;
  currentLesson=id;
  if(id.startsWith('b')){currentMod='b';document.querySelectorAll('.mod-tab').forEach((t,i)=>{t.classList.toggle('active',i===1);});}
  else if(id.startsWith('a')){currentMod='a';document.querySelectorAll('.mod-tab').forEach((t,i)=>{t.classList.toggle('active',i===0);});}
  renderNav();
  if(lesson.type==='quiz')showQuiz(lesson);
  else if(lesson.type==='exercicio')showExercicio(lesson);
  else showLesson(lesson);
  window.scrollTo(0,0);
}

function prevNext(dir){
  const all=getFlatAll().filter(l=>l.type!=='quiz-geral');
  const idx=all.findIndex(l=>l.id===currentLesson);
  const next=all[idx+dir];
  if(next)goTo(next.id);
}

// ══════════════════════════════════════
// LESSON
// ══════════════════════════════════════
function getModLabel(id){return id&&id.startsWith('b')?'Módulo B — Saúde Pública':'Módulo A — WebApps';}
function getEtapaLabel(id){
  const mod=id&&id.startsWith('b')?curriculum.b:curriculum.a;
  for(const e of mod.etapas){for(const a of e.aulas){if(a.id===id)return e.label;}}return '';
}
function modColor(id){return id&&id.startsWith('b')?'mod-b':'';}

function lessonHeader(lesson,typeBadge,typeClass){
  const isB=lesson.id.startsWith('b');
  return `
<div class="lesson-header">
  <div class="lh-breadcrumb"><span>${getModLabel(lesson.id)}</span><span class="sep">/</span><span>${getEtapaLabel(lesson.id)}</span></div>
  <div class="lh-meta"><span class="lh-type-badge ${typeClass}">${typeBadge}</span></div>
  <div class="lh-title ${modColor(lesson.id)}">${lesson.title}</div>
</div>
<div class="lesson-progress">
  <div class="lp-inner">
    <span class="lp-label">Progresso do módulo</span>
    <div class="lp-bar"><div class="lp-fill ${isB?'mod-b':''}" style="width:${modProgress(lesson.id)}%"></div></div>
    <span class="lp-pct">${modProgress(lesson.id)}%</span>
  </div>
</div>`;
}

function modProgress(id){
  const mod=id.startsWith('b')?'b':'a';
  const lessons=allLessons(mod);
  const cnt=lessons.filter(l=>done.has(l.id)).length;
  return Math.round((cnt/lessons.length)*100);
}

function lessonNav(id){
  const isDone=done.has(id);
  return `
<div class="lesson-nav">
  <button class="mark-done-btn${isDone?' done':''}" onclick="markDone('${id}',this)">
    ${isDone?'✓ Concluído':'Marcar como concluído'}
  </button>
  <div class="nav-prev-next">
    <button class="btn btn-secondary btn-sm" onclick="prevNext(-1)">← Anterior</button>
    <button class="btn btn-primary btn-sm" onclick="prevNext(1)">Próxima →</button>
  </div>
</div>`;
}

function showLesson(lesson){
  const main=document.getElementById('main-area');
  main.innerHTML=lessonHeader(lesson,'Aula','badge-aula')+
    `<div class="lesson-body">${lesson.content}</div>`+
    lessonNav(lesson.id);
}

function showExercicio(lesson){
  const main=document.getElementById('main-area');
  main.innerHTML=lessonHeader(lesson,'Exercício','badge-exercicio')+
    `<div class="lesson-body">${lesson.content}</div>`+
    lessonNav(lesson.id);
}

function markDone(id,btn){
  if(done.has(id)){done.delete(id);}else{done.add(id);}
  btn.className=`mark-done-btn${done.has(id)?' done':''}`;
  btn.textContent=done.has(id)?'✓ Concluído':'Marcar como concluído';
  updateProgress();
  renderNav();
}

// ══════════════════════════════════════
// QUIZ
// ══════════════════════════════════════
function showQuiz(lesson){
  const main=document.getElementById('main-area');
  const isB=lesson.id.startsWith('b');
  let html=lessonHeader(lesson,'Quiz','badge-quiz')+
    `<div class="quiz-container">
    <div class="quiz-title">${lesson.title}</div>
    <div class="quiz-sub">Responda todas as questões e veja o resultado ao final.</div>`;
  lesson.quiz.forEach((q,qi)=>{
    html+=`<div class="q-block" id="qb-${qi}">
      <div class="q-num">Questão ${qi+1} de ${lesson.quiz.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">`;
    q.opts.forEach((opt,oi)=>{
      html+=`<button class="q-opt" data-qi="${qi}" data-oi="${oi}" onclick="answerQ(this,${qi},${oi},${q.ans},'${lesson.id}','${q.exp.replace(/'/g,"\\'")}')">
        <span class="opt-indicator">${String.fromCharCode(65+oi)}</span>${opt}</button>`;
    });
    html+=`</div><div class="q-explanation" id="exp-${qi}">💡 ${q.exp}</div></div>`;
  });
  html+=`<div class="quiz-result" id="quiz-res">
    <div class="qr-score" id="qr-score">0/${lesson.quiz.length}</div>
    <div class="qr-label">respostas corretas</div>
    <div class="qr-msg" id="qr-msg"></div>
    <div class="quiz-actions">
      <button class="btn btn-secondary" onclick="resetQuiz('${lesson.id}')">🔄 Refazer quiz</button>
      <button class="btn btn-primary" onclick="prevNext(1)">Próxima aula →</button>
    </div>
  </div></div>`+lessonNav(lesson.id);
  main.innerHTML=html;
  window._quizState={answers:{},total:lesson.quiz.length,lid:lesson.id};
}

function answerQ(btn,qi,oi,ans,lid,exp){
  const block=document.getElementById('qb-'+qi);
  if(block.dataset.answered)return;
  block.dataset.answered='1';
  const opts=block.querySelectorAll('.q-opt');
  opts.forEach(b=>b.disabled=true);
  opts[ans].classList.add('correct');
  if(oi!==ans)btn.classList.add('wrong');
  document.getElementById('exp-'+qi).classList.add('show');
  window._quizState.answers[qi]=oi===ans;
  const answered=Object.keys(window._quizState.answers).length;
  if(answered===window._quizState.total){
    const correct=Object.values(window._quizState.answers).filter(Boolean).length;
    const res=document.getElementById('quiz-res');
    document.getElementById('qr-score').textContent=correct+'/'+window._quizState.total;
    const pct=Math.round((correct/window._quizState.total)*100);
    document.getElementById('qr-msg').textContent=pct>=80?'Excelente! Você domina o conteúdo desta etapa.':pct>=60?'Bom progresso! Revise as questões que errou antes de avançar.':'Recomendo rever o conteúdo desta etapa antes de continuar.';
    res.classList.add('show');
    if(pct>=60)markDoneById(window._quizState.lid);
  }
}

function markDoneById(id){
  done.add(id);updateProgress();renderNav();
}

function resetQuiz(id){
  const lesson=getFlatAll().find(l=>l.id===id);
  if(lesson)showQuiz(lesson);
}

function showQuizGeral(){
  const main=document.getElementById('main-area');
  let html=`<div class="lesson-header">
    <div class="lh-breadcrumb"><span>Avaliação Final</span></div>
    <div class="lh-meta"><span class="lh-type-badge badge-quiz-geral">Quiz Geral — ${quizGeralData.length} questões</span></div>
    <div class="lh-title">Quiz Completo — Módulos A e B</div>
  </div>
  <div class="quiz-container">
  <div class="quiz-title">Avaliação Final Integrada</div>
  <div class="quiz-sub">${quizGeralData.length} questões cobrindo WebApps e Saúde Pública. Responda com calma — cada questão tem explicação ao final.</div>`;
  quizGeralData.forEach((q,qi)=>{
    html+=`<div class="q-block" id="gqb-${qi}">
      <div class="q-num" style="display:flex;justify-content:space-between;"><span>Questão ${qi+1}/${quizGeralData.length}</span><span style="color:${q.m==='A'?'var(--teal)':'var(--amber)'}">Módulo ${q.m}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">`;
    q.opts.forEach((opt,oi)=>{
      html+=`<button class="q-opt" onclick="answerGeral(this,${qi},${oi},${q.ans},'${q.exp.replace(/'/g,"\\'")}')">
        <span class="opt-indicator">${String.fromCharCode(65+oi)}</span>${opt}</button>`;
    });
    html+=`</div><div class="q-explanation" id="gexp-${qi}">💡 ${q.exp}</div></div>`;
  });
  html+=`<div class="quiz-result" id="gquiz-res">
    <div class="qr-score" id="gqr-score">0/${quizGeralData.length}</div>
    <div class="qr-label">respostas corretas</div>
    <div class="qr-msg" id="gqr-msg"></div>
    <div class="quiz-actions">
      <button class="btn btn-secondary" onclick="showQuizGeral()">🔄 Refazer quiz geral</button>
    </div>
  </div></div>`;
  main.innerHTML=html;
  window._geralState={answers:{},total:quizGeralData.length};
}

function answerGeral(btn,qi,oi,ans,exp){
  const block=document.getElementById('gqb-'+qi);
  if(block.dataset.answered)return;
  block.dataset.answered='1';
  const opts=block.querySelectorAll('.q-opt');
  opts.forEach(b=>b.disabled=true);
  opts[ans].classList.add('correct');
  if(oi!==ans)btn.classList.add('wrong');
  document.getElementById('gexp-'+qi).classList.add('show');
  window._geralState.answers[qi]=oi===ans;
  const answered=Object.keys(window._geralState.answers).length;
  if(answered===window._geralState.total){
    const correct=Object.values(window._geralState.answers).filter(Boolean).length;
    const pct=Math.round((correct/window._geralState.total)*100);
    document.getElementById('gqr-score').textContent=correct+'/'+window._geralState.total;
    document.getElementById('gqr-msg').textContent=pct>=80?'🎯 Excelente! Você domina os fundamentos das duas frentes. Você está pronto para ensinar isso para outros.':pct>=60?'✅ Bom resultado! Revise os pontos que errou e refaça para consolidar.':'📚 Recomendo revisar os módulos antes de avançar. Os conteúdos estão no menu lateral.';
    document.getElementById('gquiz-res').classList.add('show');
  }
}
