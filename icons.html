<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Galeria de Ícones</title>
<style>
  body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
  }
  h1 {
    margin-bottom: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 15px;
  }
  .item {
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    border: 1px solid #ddd;
  }
  .item:hover {
    background: #eaeaea;
  }
  .icon {
    font-size: 28px;
    margin-bottom: 8px;
  }
  .combo {
    font-size: 12px;
    color: #555;
    border-top: 1px solid #eee;
    margin-top: 8px;
    padding-top: 6px;
  }
</style>
</head>
<body>

<h1>📋 Galeria de Ícones</h1>

<div class="grid" id="grid"></div>

<script>
const items = [
  ["❓","[IDEIA]"], ["❓","[DUVIDA]"], ["❓","[REFLEXAO]"],
  ["💻","[DEV]"], ["💻","[SCRIPT]"], ["💻","[AUTOMACAO]"], ["💻","[FERRAMENTA]"],
  ["⚙️","[SISTEMA]"], ["⚙️","[PROCESSO]"], ["⚙️","[CONFIG]"],
  ["📊","[SLIDES]"], ["📊","[APRESENTACAO]"], ["📊","[PALESTRA]"],
  ["🎤","[FALA]"], ["🎤","[ROTEIRO]"],
  ["📚","[GUIA]"], ["📚","[CARTILHA]"], ["📚","[MATERIAL]"], ["📚","[FORMAÇÃO]"],
  ["🎓","[CAPACITACAO]"], ["🎓","[TREINAMENTO]"],
  ["🏛️","[GESTAO]"], ["🏛️","[ADM]"], ["🏛️","[ORGANIZACAO]"],
  ["🗂️","[FLUXO]"], ["🗂️","[ESTRUTURA]"],
  ["📄","[DOC]"], ["📄","[ATA]"], ["📄","[MEMO]"], ["📄","[OFICIO]"],
  ["🖋️","[REDACAO]"], ["🖋️","[MINUTA]"],
  ["📌","[IMPORTANTE]"], ["📌","[PRIORIDADE]"],
  ["🚀","[PROJETO]"], ["🚀","[IMPLEMENTACAO]"],
  ["🧠","[ANALISE]"], ["🧠","[ESTUDO]"],
  ["🔍","[REVISAO]"], ["🔍","[AUDITORIA]"],
  ["📅","[PLANEJAMENTO]"], ["📅","[CRONOGRAMA]"],
  ["📈","[ESTRATEGIA]"], ["📈","[INDICADORES]"],
  ["🧩","[INTEGRACAO]"], ["🧩","[ARTICULACAO]"],
  ["💡","[INSIGHT]"], ["💡","[IDEIA_BRUTA]"],
  ["⚠️","[ATENCAO]"], ["⚠️","[PENDENTE]"],
  ["✅","[CHECK]"], ["✅","[CONCLUIDO]"]
];

const grid = document.getElementById("grid");

items.forEach(([icon, text]) => {
  const item = document.createElement("div");
  item.className = "item";

  const iconDiv = document.createElement("div");
  iconDiv.className = "icon";
  iconDiv.innerText = icon;
  iconDiv.onclick = (e) => {
    e.stopPropagation();
    copy(icon);
  };

  const comboDiv = document.createElement("div");
  comboDiv.className = "combo";
  comboDiv.innerText = `${icon} ${text}`;
  comboDiv.onclick = (e) => {
    e.stopPropagation();
    copy(`${icon} ${text}`);
  };

  item.appendChild(iconDiv);
  item.appendChild(comboDiv);
  grid.appendChild(item);
});

function copy(text) {
  navigator.clipboard.writeText(text);
  alert("Copiado: " + text);
}
</script>

</body>
</html>
